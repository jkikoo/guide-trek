nier point certain si le trajet est connu.','Appelle ou prépare l’aide si la nuit, le terrain ou la batterie réduisent la marge.']);if(has('return')&&has('last')&&!has('exposed'))return R('caution','Reviens au dernier point certain','Le retour connu est plus cohérent qu’une progression supposée, tant qu’il ne crée pas un danger supérieur maintenant.',['Confirme le cap et le terrain du retour.','Garde le groupe ensemble.','Marque mentalement ou sur la carte chaque point confirmé.','Arrête si le retour devient raide, barré ou incertain.','Réévalue au dernier point certain.']);if(has('gps')&&has('trail')&&!has('dark')&&!has('exposed'))return R('caution','Repars seulement sur un trajet recoupé','Deux indices concordants peuvent permettre de reprendre, mais pas vers une direction choisie sur une seule trace ou intuition.',['Compare carte, GPS, relief, altitude et sens des pentes.','Identifie le prochain point vérifiable.','Reste sur sentier visible.','Fixe une réévaluation courte.','Fais demi-tour au premier doute non résolu.']);if(has('dark')||has('exposed'))return R('stop','N’ajoute pas une errance dans un terrain risqué','La nuit, la batterie faible ou le terrain engagé rendent les essais successifs dangereux.',['Reste sur un site sûr.','Prépare un abri ou une protection thermique.','Économise la batterie et note les coordonnées.','Rends-toi visible ou audible.','Appelle de l’aide si aucune sortie sûre ne peut être confirmée.']);return R('info','Recoupe les informations avant de repartir','Aucune direction ne doit être choisie sur une seule indication.',['Compare carte, GPS, altitude, relief et sens des pentes.','Identifie le dernier point certain.','Cherche un trajet confirmé et réversible.','Ne coupe pas hors sentier vers une trace supposée.']);}
function gearDecision(){if(has('fixFails'))return R('stop','Considère la fonction comme perdue','La solution annoncée ne fonctionne pas après test. Il faut raisonner comme si l’abri, l’appui, la navigation, la lumière ou la communication restait indisponible.',['Arrête le groupe sur un point stable.','Protège les fonctions restantes et le matériel sec.','Écarte tout passage engagé, descente raide ou progression de nuit.','Compare retour, sortie proche, abri ou appel selon la fonction perdue.','Demande de l’aide si le groupe ne peut plus repartir ensemble sans créer un risque supérieur.']);if(has('fixWeak'))return R('caution','Raccourcis avec une solution fragile','La réparation ou la redondance tient seulement quelques minutes. Elle peut aider à sortir d’un mauvais endroit, mais elle ne doit pas porter une longue section.',['Reste sur terrain simple et vérifiable.','Évite passage exposé, nuit, crête, torrent et hors sentier.','Réduis l’objectif vers sortie, retour ou abri le plus proche confirmé.','Fixe un contrôle très court de la réparation.','Stoppe et prépare l’aide si la solution faiblit encore.']);if(has('fixWorks')&&!has('dark')&&!has('exposed'))return R('go','Continue seulement avec test vérifié','La solution de secours a été testée sur place et le terrain ne rajoute pas de contrainte forte maintenant. La poursuite reste conditionnelle, pas automatique.',['Garde la solution accessible et protégée.','Réduis l’objectif si la panne touche une fonction critique.','Évite d’entrer dans une section engagée avec cette marge réduite.','Fixe le prochain point de contrôle.','Reviens au mode sortie si la solution faiblit.']);if(has('shelterLost')&&!has('backup')&&(has('dark')||state.context==='camp'||state.context==='arrived'))return R('stop','Remplace la protection avant de décider la suite','Perdre l’abri ou le couchage ne conclut pas automatiquement au demi-tour. La priorité est de créer une protection réelle avant une marche longue ou une nuit exposée.',['Regroupe couches sèches, téléphone, batterie et couchage encore utilisable.','Cherche partage d’abri, cabane, auvent, tarp, sursac ou protection de fortune.','Compare seulement ensuite retour, échappatoire et attente.','Évite une sortie longue si froid, nuit ou mauvais temps arrivent.','Appelle de l’aide si aucune protection praticable n’existe.']);if(has('nav')&&!has('backup'))return R('stop','Ne transforme pas la panne de navigation en errance','Sans carte, GPS ou batterie fiable, continuer peut devenir plus dangereux que s’arrêter, surtout si le terrain se complique.',['Arrête-toi sur un point stable.','Identifie dernier point certain et repères visibles.','Économise la batterie restante.','Rejoins seulement un trajet connu ou une sortie confirmée.','Appelle ou envoie chercher de l’aide si aucune direction n’est confirmée par deux indices.']);if(has('light')&&(has('dark')||has('exposed'))&&!has('backup'))return R('stop','Ne continue pas sans éclairage fiable','Une lampe perdue ou inutilisable devient critique avant la nuit, sous mauvais temps ou en terrain engagé. La bonne décision consiste à retrouver une marge de lumière, pas à espérer finir juste à temps.',['Arrête-toi sur un point stable avant la pénombre.','Protège téléphone et batterie sans les transformer en éclairage principal.','Cherche partage de lampe, réparation, pile ou sortie très courte et confirmée.','Évite descente raide, torrent, pierrier et hors sentier.','Prépare aide ou bivouac hors danger évident si la sortie ne tient pas dans la lumière restante.']);if(has('boot')&&(has('exposed')||!has('repair')))return R('stop','Protège l’appui avant tout passage engagé','Une chaussure ou semelle défaillante peut transformer une pente facile en chute sérieuse.',['Répare ou solidarise la chaussure sur point sûr.','Répartis le poids du sac.','Évite descente raide, pierrier, boue ou torrent.','Raccourcis vers l’option la plus simple si la réparation tient mal.','Appelle de l’aide si 20 pas sans aide deviennent impossibles.']);if(has('light')&&!has('backup'))return R('caution','Réduis l’itinéraire avant la baisse de lumière','L’éclairage paraît secondaire tant qu’il fait jour, mais il fixe l’heure limite réelle de l’étape. Sans redondance, la suite doit devenir courte et vérifiable.',['Calcule le temps jusqu’à la sortie ou au camp avec une marge large.','Teste toute solution de fortune maintenant.','Garde le groupe compact avant zones boisées, blocs ou intersections.','Renonce au passage engagé si la lumière baisse.','Réévalue au prochain point sûr.']);if(has('critical')&&!has('backup')&&has('exit')&&!has('exposed'))return R('caution','Rejoins la sortie confirmée avant que la panne empire','Une fonction essentielle est fragilisée, mais une sortie proche et simple peut être plus réaliste qu’attendre une solution parfaite sur place.',['Confirme distance, terrain et lumière jusqu’à la sortie.','Répare sommairement si cela sécurise les prochaines minutes.','Répartis le poids et protège les fonctions restantes.','Avance lentement et stoppe si la panne empire.','Appelle de l’aide si la sortie devient exposée ou incertaine.']);if(has('critical')&&!has('backup'))return R('stop','Considère l’étape comme compromise','Une fonction essentielle sans redondance peut rendre la suite ou la nuit dangereuse.',['Évalue si une réparation simple est possible sur place.','Compare retour et échappatoire avant la nuit ou le mauvais temps.','N’entre pas dans un passage engagé.','Appelle de l’aide si aucune route, sentier ou retour identifié ne permet au groupe de partir ensemble.']);if(has('repair')&&!has('fixWorks'))return R('caution','Répare puis teste avant de décider','La réparation ne compte pas encore comme preuve. Tant qu’elle n’a pas tenu un test court, elle ne doit pas justifier une poursuite normale.',['Pose le groupe hors du passage.','Protège le matériel sec pendant l’intervention.','Teste réellement la réparation.','Recalcule la marge de temps après l’arrêt.','Prévois une option de sortie si la réparation faiblit.']);if(has('backup')&&!has('dark')&&!has('exposed')&&has('fixWorks'))return R('go','Continue seulement avec une redondance vérifiée','La panne reste gérable si la fonction est réellement remplacée et si la marge est suffisante.',['Vérifie la solution de secours maintenant.','Réduis l’objectif si la panne touche une fonction critique.','Garde un point de sortie en tête.','Fixe un point de réévaluation.']);return R('caution','Raccourcis avant que la panne décide pour toi','La situation reste praticable, mais une panne sous fatigue, nuit ou météo peut se dégrader brutalement.',['Choisis l’option la moins exposée.','Évite les passages engagés.','Protège les fonctions restantes.','Réévalue avant la nuit ou le prochain point dur.']);}
function foodDecision(){if(has('energyWorse'))return R('stop','Ne traite plus cela comme une simple faim','Après une prise possible, la personne se dégrade ou ne peut plus avancer normalement. Le problème touche déjà la sécurité humaine du groupe.',['Arrête le groupe sur un point stable et protège du froid ou du soleil.','Ne force pas nourriture ou boisson si la conscience ou la déglutition sont altérées.','Prépare position, état, évolution et moyens d’alerte.','Cherche aide proche, sortie très courte ou appel selon le terrain.','Ne repars pas vers l’objectif tant que l’état se dégrade.']);if(has('energyStill'))return R('caution','Raccourcis avant la panne d’énergie','La faiblesse, la nausée ou le moral bas persistent après une prise possible. La bonne réponse est de réduire l’effort et la durée restante, pas de supposer que ça va passer.',['Reste au calme quelques minutes de plus si le lieu le permet.','Partage une prise simple vers la personne la plus faible.','Réduis allure, dénivelé et terrain technique.','Choisis retour, sortie, abri ou ravitaillement confirmé.','Appelle si confusion, chute, incapacité de marche ou vomissements apparaissent.']);if(has('energyBetter'))return R('caution','Repars lentement après amélioration visible','La petite prise a aidé, mais elle montre surtout que l’énergie était déjà une limite. La suite doit rester courte, simple et réévaluée.',['Repars sur terrain facile, sans accélérer.','Garde une autre petite prise accessible.','Fixe le prochain arrêt nourriture.','Évite passage engagé ou longue section sans sortie.','Stoppe si faiblesse, nausée ou jugement inhabituel reviennent.']);if(has('weak')&&!has('snacks'))return R('stop','Restaure de l’énergie avant toute option longue','Froid, faiblesse ou jugement qui baisse indiquent que le problème alimentaire agit déjà sur la sécurité. Continuer normalement ou rationner abstraitement n’est pas une bonne réponse.',['Arrête le groupe sur un point stable et protège du froid ou du soleil.','Cherche tout aliment simple mangeable maintenant dans tous les sacs.','Partage d’abord vers la personne la plus faible.','Choisis sortie, refuge ou aide proche si l’énergie ne revient pas vite.','Appelle de l’aide si confusion, incapacité de marche ou absence d’option autonome apparaissent.']);if(has('animalRisk')||has('lostFood')&&state.context==='camp')return R('stop','Sécurise les odeurs avant de penser rationnement','Une nourriture volée, ouverte ou dispersée près du camp change aussi le risque animal. La priorité est de stabiliser le site et ce qui reste, pas de poursuivre l’animal ni dormir au milieu des odeurs.',['Ne poursuis pas l’animal et ne récupère rien dans une zone dangereuse.','Regroupe nourriture, déchets, popote et objets odorants restants.','Éloigne-les du couchage selon le terrain et les règles locales.','Compte seulement ce qui est intact et mangeable.','Change de site ou prépare sortie si les odeurs ne sont plus maîtrisées.']);if(has('unsafe')&&!has('snacks'))return R('caution','Ne compte pas cette nourriture comme une réserve fiable','Une nourriture souillée, avariée ou suspecte peut aggraver la situation. Elle ne devient envisageable que comme option dégradée si le risque immédiat de faiblesse ou de froid est supérieur.',['Cherche d’abord aliments intacts, partage ou aide proche.','Écarte ce qui sent mauvais, est souillé ou a été ouvert par un animal.','Ne donne pas d’aliment suspect à une personne déjà nauséeuse ou affaiblie.','Raccourcis vers sortie ou ravitaillement confirmé.','Surveille vomissements, diarrhée, fièvre ou aggravation.']);if(has('noCook')&&!has('snacks'))return R('caution','Sépare la nourriture réelle de la nourriture théorique','Des repas qui demandent cuisson, eau ou combustible ne sont pas immédiatement utiles si ces moyens manquent. Il faut recalculer avec ce qui peut vraiment être mangé maintenant.',['Compte les aliments mangeables sans cuisson ni eau.','Partage les aliments simples avant la personne la plus faible.','Évite d’attendre un repas chaud si froid, nuit ou fatigue montent.','Cherche sortie, refuge, combustible, eau ou aide proche.','Ne lance pas une longue section avec seulement des repas impossibles à préparer.']);if(has('low')&&has('far')&&!has('exit'))return R('caution','Réduis l’objectif avant que la faim décide','Un déficit sur plusieurs heures ou jours use la lucidité avant de bloquer totalement la marche. Rationner n’est cohérent que si le trajet, le froid et la personne la plus faible restent maîtrisés.',['Compte repas, snacks et aliments sans cuisson pour tout le groupe.','Fixe qui mange quoi au prochain arrêt, pas seulement ce soir.','Réduis allure, dénivelé et passage technique.','Cherche retour, échappatoire, autre groupe, cabane ou aide.','Prépare l’alerte si faiblesse, froid ou confusion apparaissent.']);if(has('low')&&has('exit'))return R('caution','Rejoins l’option confirmée avant le déficit','La nourriture est limite, mais une sortie ou un ravitaillement proche peut être le choix le plus réaliste si le terrain ne rajoute pas un risque supérieur.',['Mange une petite prise avant de repartir si possible.','Confirme distance, dénivelé, lumière et terrain jusqu’à la sortie.','Garde une réserve pour la personne la plus faible.','Avance lentement et stoppe si faiblesse ou erreur de jugement apparaissent.','Ne transforme pas la sortie en course.']);if(has('noAppetite')&&has('snacks'))return R('caution','Fais entrer de l’énergie par petites prises','Avoir de la nourriture ne suffit pas si la personne ne mange presque rien. Les petites prises régulières sont souvent plus réalistes qu’un gros repas attendu trop tard.',['Arrête-toi au calme, assis ou abrité.','Propose petites quantités faciles : sucré, salé, gras, aliments connus.','Évite de forcer si nausée forte, vomissements ou trouble de conscience.','Réévalue chaleur, humeur, lucidité et allure après 10 minutes.','Raccourcis si l’énergie ne revient pas.']);if(has('share')&&has('snacks'))return R('caution','Redistribue avant de rationner','Le bon calcul se fait au niveau du groupe. Une personne faible avec un sac vide peut mettre tout le monde en difficulté même si d’autres gardent des réserves.',['Pose toutes les réserves visibles ensemble.','Sépare ce qui se mange maintenant de ce qui demande cuisson ou eau.','Donne une prise immédiate à la personne la plus faible.','Garde une portion salée et une portion rapide pour plus tard.','Fixe le prochain arrêt nourriture.']);return R('info','Compte la nourriture réellement utile','Il manque encore les éléments qui permettent de choisir entre manger, partager, raccourcir, sortir ou attendre. La quantité brute ne suffit pas.',['Compte repas, snacks, sel et aliments sans cuisson.','Estime la durée réelle jusqu’à sortie ou ravitaillement confirmé.','Identifie la personne la plus faible et son dernier vrai apport.','Vérifie si cuisson, eau ou combustible sont nécessaires.','Décide ensuite entre partage, rationnement, sortie ou aide.']);}
function rescueDecision(){if((has('life')||has('missing')||has('blocked')||has('worse'))&&has('messenger'))return R('stop','Active le moyen d’alerte maintenant','Les éléments cochés dépassent l’autonomie normale du groupe et un moyen d’alerte existe même sans réseau mobile.',['Écarte le danger immédiat sans déplacement inutile.','Envoie position, nombre de personnes, état, météo et terrain.','Garde la balise ou radio accessible et protégée.','Prépare protection d’attente avec abri, isolation, eau, lumière ou visibilité selon ce qui existe.','Ne déplace le groupe que si rester crée un danger supérieur.']);if(has('life')||has('missing')||has('blocked')||has('worse'))return R('stop','Appelle les secours maintenant','Les éléments cochés dépassent l’autonomie normale d’un trek ou peuvent empirer pendant une évacuation improvisée.',['Écarte le danger immédiat sans déplacement inutile.','Prépare position, nombre de personnes, état, météo et terrain.','Appelle le numéro d’urgence local ou active la balise si c’est le seul moyen.','Suis les consignes reçues.','Économise la batterie et reste joignable.','Crée une protection d’attente avec ce qui existe, même imparfaite.']);if(has('walk'))return R('stop','Demande de l’aide si 20 pas sans trébucher sont impossibles','L’appel n’est pas une sanction : si une personne ne peut pas faire 20 pas sans aide ou sans trébucher, l’évacuation autonome peut créer un accident secondaire.',['Stabilise la personne hors danger immédiat.','Protège du froid, de la pluie, du soleil et du sol avec ce qui existe.','Compare seulement une aide très proche et sans passage exposé.','Prépare coordonnées, signes et évolution.','Appelle si le déplacement reste incertain.']);if(has('signalRisk'))return R('stop','Ne crée pas une deuxième urgence pour chercher du réseau','Le point de réseau impose un trajet exposé, nocturne, hors sentier, séparé ou incertain. Chercher l’appel ne doit pas mettre le groupe en pire situation.',['Crée une protection d’attente avec ce qui existe avant toute séparation.','Note position, état, météo, heure et dernier point connu.','Utilise sifflet, lampe, messages différés ou balise si disponible.','Ne sépare personne sans trajet court, horaire de retour et personne restant avec le plus vulnérable.','Appelle ou active l’alerte dès qu’un moyen sûr apparaît.']);if(has('signalClose')&&has('groupSheltered'))return R('caution','Cherche le signal avec cadre strict','Le point de réseau semble proche et le groupe restant peut attendre. Le déplacement doit rester court, annoncé et réversible.',['Note position, état, météo et heure avant de partir.','Désigne qui reste avec la personne vulnérable.','Fixe destination, trajet, heure limite et retour obligatoire.','Ne va pas sur crête, torrent, hors sentier ou passage exposé.','Envoie position, nombre de personnes et état dès que le signal passe.']);if(has('signalClose')&&!has('groupSheltered'))return R('info','Protège le groupe avant de chercher le signal','Un point de réseau proche ne suffit pas si le groupe restant n’a pas abri, eau, lumière ou surveillance. La préparation de l’attente passe d’abord.',['Regroupe le groupe sur un point stable si ce point existe ; sinon quitte seulement le danger immédiat.','Rends accessibles isolation, eau, lumière et téléphone avec ce qui existe.','Garde une personne avec le blessé ou la personne la plus vulnérable.','Fixe ensuite seulement trajet, horaire et retour pour chercher le signal.']);if(has('noSignal')&&!has('messenger'))return R('info','Prépare l’alerte sans disperser le groupe','Sans réseau ni balise, chercher du signal peut être utile mais ne doit pas créer une deuxième urgence.',['Note position, itinéraire, état et heure avant tout déplacement.','Crée une protection d’attente avec ce qui existe.','Cherche un point de réseau seulement si le trajet est court et sûr.','Si quelqu’un part chercher du réseau, fixe horaire, destination et retour.','Garde au moins une personne avec le blessé ou le groupe vulnérable.']);if(!has('position'))return R('info','Fixe ta position avant l’appel si possible','Un appel peut être nécessaire, mais une position claire améliore fortement l’aide. Ne retarde pas si un signe grave existe.',['Note coordonnées GPS, altitude, itinéraire et dernier point connu.','Décris terrain, météo, visibilité et accès possible.','Garde téléphone et batterie au chaud et au sec.','Rends le groupe visible ou audible.']);return R('caution','Prépare les informations avant de décider','Même sans signe grave coché, une préparation structurée évite de perdre du temps si la situation évolue.',['Confirme les coordonnées et le dernier point connu.','Note état, évolution, météo et autonomie.','Identifie une sortie localisée, courte et sans passage exposé.','Garde protection, eau et lumière pour l’attente si ces ressources existent.','Appelle si la personne trébuche, ne tient plus debout ou si l’état se dégrade.']);}
function bivouacDecision(){if(has('campColdWorse'))return R('stop','Traite le froid comme l’urgence du camp','Après installation ou renforcement, la personne présente confusion, somnolence, maladresse forte ou frissons incontrôlables. Le camp ne suffit pas à stabiliser la situation.',['Arrête toute autre tâche de confort.','Isole la personne du sol, du vent et de l’humidité.','Renforce chaleur autour du tronc, du cou et de la tête.','Prépare position, état, évolution et moyen d’alerte.','Appelle les secours si l’amélioration n’est pas rapide ou si l’autonomie du groupe est incertaine.']);if(has('campColdStill'))return R('stop','Renforce la protection avant d’attendre','La personne reste froide ou ne récupère pas dans le camp actuel. Attendre dans les mêmes conditions risque d’aggraver le problème.',['Ajoute isolation du sol, couche sèche, coupe-vent ou abri partagé.','Éloigne le couchage des parois mouillées et de l’écoulement.','Donne boisson ou nourriture seulement si la personne avale normalement.','Compare déplacement vers abri, aide proche ou appel.','Réévalue en minutes, pas en fin de nuit.']);if(has('hazard'))return R('stop','Ne transforme pas ce lieu en camp','Un bivouac ne réduit le risque que si le site lui-même ne t’installe pas dans l’axe de l’eau, des pierres, du vent ou d’un arbre menaçant.',['Quitte ravine, berge, cuvette, crête, pied de pente et arbre menaçant.','Garde duvet, couches sèches et téléphone protégés pendant la recherche.','Cherche un sol drainant, légèrement bombé, avec sortie de repli.','Monte seulement quand le lieu réduit le risque.']);if(has('animalSigns')&&!has('foodSecure'))return R('stop','Ne dors pas avec les odeurs et la nourriture','Un site avec traces, restes, odeurs ou activité animale impose de traiter nourriture, déchets et objets odorants avant le couchage. Sans stockage crédible, le camp n’est pas acceptable.',['Garde nourriture et déchets sous contrôle immédiat.','Éloigne le couchage des odeurs et restes si le terrain le permet.','Cherche un autre site ou un stockage conforme aux règles locales.','Ne cuisine pas dans l’espace de sommeil.','Prépare déplacement ou aide si aucune solution propre n’existe avant la nuit.']);if(has('animalSigns')&&has('foodSecure'))return R('caution','Sécurise les odeurs avant d’installer le couchage','La présence animale ne condamne pas toujours le bivouac, mais elle change l’ordre des priorités : nourriture, déchets et objets odorants passent avant le confort.',['Isole nourriture, déchets, popote et produits odorants du couchage.','Nettoie ou ferme ce qui peut attirer.','Installe le couchage seulement après stockage réel.','Garde lampe, chaussures et sortie prêtes.','Change de site si l’activité animale se rapproche.']);if(state.context==='packing'&&!has('water'))return R('stop','Ne démonte pas avant d’être prêt à partir','Perdre l’abri avant d’avoir chaussures, veste, eau, lampe, navigation et téléphone accessibles enlève la marge au mauvais moment.',['Habille-toi pour marcher.','Range le couchage et les couches sèches au sec.','Prépare destination, navigation et lampe.','Conserve la protection extérieure jusqu’au dernier moment.']);if(state.context==='camp'&&(has('threat')||has('wind')&&!has('shelter')))return R('stop','Prépare un déplacement ou un renforcement immédiat','Un camp installé peut devenir mauvais si l’eau, le vent, la pente ou les ancrages changent. Rester par inertie est rarement une bonne raison.',['Protège le couchage et les vêtements secs.','Garde chaussures, veste, lampe, téléphone et eau accessibles.','Renforce seulement si cela suffit vraiment.','Sinon déplace vers un site plus sûr dès que le passage est praticable.']);if(!has('shelter')&&!has('shared'))return R('info','Trouve une protection praticable avant la nuit','Sans tente, tarp, abri partagé ou solution de fortune, la décision n’est pas encore complète. La bonne option dépend du froid, de la distance et du terrain.',['Cherche cabane, auvent, autre groupe, relief abrité ou montage de fortune.','Compare retour, sortie et attente selon durée réelle.','Protège d’abord les personnes froides et le matériel sec.','Appelle de l’aide si aucune protection crédible n’apparaît.']);if(has('campWarm')&&has('drain'))return R('caution','Garde le camp simple et surveillé','La personne récupère et le site paraît praticable. Le camp reste une situation à contrôler, pas un retour au confort normal.',['Garde chaussures, lampe, veste, téléphone et eau accessibles.','Surveille froid, condensation, drainage et ancrages.','Isole le mouillé du couchage.','Fixe une nouvelle réévaluation courte.','Prépare repli ou appel si froid, eau ou vent reprennent.']);if(has('drain'))return R('caution','Installe un camp sobre et surveillé','Le site paraît praticable. L’objectif est de créer vite une protection utile, pas un camp confortable au détriment de la marge.',['Oriente l’abri contre le vent dominant.','Ancre et ferme avant de sortir le couchage.','Éloigne le sec des parois mouillées.','Garde chaussures, lampe, veste, téléphone et eau prêts.','Réévalue drainage, ancrages et état du groupe après 10 minutes.']);return R('info','Vérifie le site avant de monter','Le bivouac n’est cohérent que si le lieu réduit le risque. Il manque encore une preuve de drainage ou de repli.',['Observe écoulement, pente, arbres, pierres et vent.','Cherche un sol drainant avec issue de repli.','Garde le sac fermé pendant l’observation.','Monte seulement quand les dangers évidents sont écartés.']);}
function waterDecision(){if(has('heatWorse'))return R('stop','Traite la chaleur comme l’urgence principale','Après ombre et baisse d’effort, confusion, malaise, peau très chaude ou impossibilité de boire indiquent un risque qui dépasse la simple gestion de l’eau.',['Arrête le groupe hors soleil direct si un point moins exposé existe à proximité.','Refroidis activement : ombre si disponible, ventilation, eau sur la peau si disponible.','Ne force pas à boire si la conscience ou la déglutition sont altérées.','Prépare position, état, évolution et moyen d’alerte.','Appelle les secours ou active la balise si le signe persiste.']);if(has('heatStill'))return R('caution','Réduis l’effort avant de chercher plus loin','La chaleur, les crampes ou les vertiges persistent après arrêt. La suite doit baisser l’exposition, pas simplement viser la prochaine source supposée.',['Mets-toi à l’ombre si elle existe ; sinon crée de l’ombre ou attends une période moins chaude si rester ne t’expose pas plus.','Réduis allure, charge et dénivelé.','Bois par petites prises si la personne avale normalement.','Cherche sortie, eau confirmée ou aide proche seulement par terrain simple.','Stoppe et appelle si confusion, malaise ou impossibilité de marcher apparaissent.']);if(has('heatBetter')&&has('exit'))return R('caution','Rejoins la sortie pendant que la marge revient','L’amélioration après repos est utile, mais elle ne rend pas la chaleur anodine. Une sortie confirmée devient l’option la plus logique.',['Repars lentement et à l’ombre dès que possible.','Garde eau, sel ou nourriture accessible.','Évite détour au soleil, crête et section sèche.','Réévalue au prochain point d’ombre ou de repos.','Arrête si vertiges, crampes ou confusion reviennent.']);if(has('heatBetter')&&!has('source')&&!has('exit'))return R('caution','Reprends seulement après recalcul de l’eau et de l’ombre','Les signes diminuent, mais aucune eau ou sortie confirmée n’est cochée. La suite doit rester courte et réversible.',['Reste à l’ombre si elle existe, sinon crée de l’ombre ou limite l’exposition le temps de recalculer.','Compte l’eau disponible pour tout le groupe.','Évite section sèche, soleil direct et dénivelé fort.','Cherche le prochain point d’ombre, d’eau confirmée ou de sortie.','Réévalue dès que vertige, crampe ou fatigue reviennent.']);if(has('crossing')&&has('bridge'))return R('caution','Prends l’alternative hors d’eau','Un pont, un détour ou une attente praticable vaut mieux qu’un franchissement douteux. Le temps perdu est souvent moins dangereux qu’une chute en eau froide ou rapide.',['Confirme que l’alternative ne rajoute pas un passage plus exposé.','Reste hors berge instable et hors courant.','Garde le groupe ensemble.','Réévalue eau disponible, lumière et fatigue après le détour.']);if(has('crossing')&&!has('bridge'))return R('stop','Ne force pas le franchissement','Un torrent trouble, rapide ou en hausse est un piège classique : la traversée peut devenir plus dangereuse que le retard, le détour ou l’appel.',['Cherche pont, gué plus large et calme, détour ou attente hors d’eau.','Détache les sangles du sac si une traversée devient réellement inévitable.','Ne traverse pas seul ni avec une personne faible.','Renonce si l’eau monte, pousse fort ou masque les appuis.','Appelle de l’aide si le groupe est bloqué sans option sûre.']);if(has('badWater')&&has('source')&&(has('none')||has('heat'))&&!has('treat'))return R('caution','Choisis le risque le moins dangereux avec cette eau','Une eau visiblement douteuse n’est pas une source normale. Elle peut toutefois devenir le moindre risque si la chaleur, la rupture d’eau ou l’épuisement menacent maintenant.',['Cherche d’abord une eau plus claire, en amont et loin des traces évidentes.','Filtre avec tissu si aucun traitement n’existe.','Bois par petites prises seulement si l’alternative immédiate est pire.','Réduis l’effort et rejoins sortie, aide ou traitement dès que possible.','Surveille vomissements, diarrhée, fièvre ou aggravation.']);if(has('heat')&&has('none'))return R('stop','Réduis l’effort avant de chercher loin','Manque d’eau et chaleur font perdre le jugement. Continuer vers une source supposée peut être pire qu’un arrêt ombragé et une sortie confirmée.',['Mets le groupe à l’ombre si elle existe, sinon crée de l’ombre ou limite l’exposition directe.','Réduis l’effort et répartis l’eau restante.','Cherche une source seulement si le trajet est court, visible et sûr.','Privilégie sortie ou aide proche confirmée.','Appelle si confusion, incapacité de marche ou absence d’option apparaissent.']);if(has('badWater')&&has('source'))return R('caution','Ne traite pas cette eau comme une source fiable','Algues, odeur, carcasse ou contamination visible changent l’arbitrage. La bonne question n’est pas seulement boire ou ne pas boire, mais quelle option réduit le plus le risque global.',['Cherche une autre source ou le dernier point d’eau connu.','Utilise traitement complet si disponible.','Évite de remplir toute la réserve avec cette eau si une meilleure option existe.','Raccourcis vers sortie ou eau fiable.','Garde cette option comme dernier recours si la déshydratation devient le risque dominant.']);if(has('noSource')&&has('lastWater')&&!has('heat'))return R('caution','Reviens au point d’eau connu si le retour reste simple','Une section sèche devant ne se traite pas comme une gêne mineure. Si le dernier point d’eau est réellement atteignable sans danger supérieur, reprendre de l’eau maintenant peut être le choix le plus solide.',['Confirme le trajet retour et le temps nécessaire.','Garde assez d’eau pour revenir sans te mettre en rupture.','Évite de compter sur une cache ou une source supposée.','Une fois rechargé, recalcule la section sèche avant de repartir.']);if(has('noSource')&&!has('source')&&!has('exit'))return R('info','Ne t’engage pas dans une section sèche non confirmée','Le problème n’est pas seulement la quantité restante : c’est l’absence de prochain point fiable. Avancer sans plan d’eau transforme une marge faible en urgence.',['Arrête-toi à l’ombre si possible.','Compte l’eau disponible pour tout le groupe.','Estime la durée jusqu’au prochain point fiable, pas jusqu’à une source supposée.','Compare retour au dernier point d’eau, détour, sortie ou attente.','Renonce à la section sèche si la réserve ne couvre pas largement le trajet.']);if(has('dryStretch')&&!has('source')&&!has('exit'))return R('caution','Recalcule avant la section sèche','Une longue portion sans eau peut rester possible si elle est prévue, mais elle doit être décidée avant d’y entrer, pas subie au milieu.',['Calcule eau par personne, chaleur, dénivelé et rythme réel.','Vérifie le dernier point d’eau fiable.','Décide maintenant entre charger plus, attendre la fraîcheur, revenir ou raccourcir.','Ne dépends pas d’une cache non garantie.']);if(has('overdrink'))return R('caution','Ne réponds pas seulement par plus d’eau','Maux de tête, nausée et grande quantité d’eau sans sel peuvent évoquer un problème d’équilibre, pas seulement une déshydratation.',['Arrête l’effort et mets la personne au repos.','Évite de forcer l’eau.','Fais prendre nourriture salée si la personne est lucide et avale normalement.','Surveille confusion, vomissements et aggravation.','Demande une aide médicale si l’état ne s’améliore pas.']);if(has('source')&&!has('treat'))return R('caution','Utilise l’eau seulement après choix du risque','Boire une eau douteuse peut être acceptable si le risque immédiat de chaleur ou d’épuisement dépasse le risque digestif futur, mais ce n’est pas neutre.',['Privilégie eau claire en amont des zones fréquentées.','Filtre avec tissu si aucune autre option n’existe.','Bois par petites prises si l’alternative est l’épuisement.','Cherche une sortie ou un traitement dès que possible.']);if(has('source')&&has('treat'))return R('go','Recharge avant de poursuivre','Une source traitable redonne de la marge seulement si le groupe prend le temps de boire, traiter et recalculer l’étape.',['Traite l’eau selon le moyen disponible.','Bois et emporte assez pour la durée réelle.','Ajoute sel ou nourriture si l’effort est long et chaud.','Réévalue distance, chaleur et état du groupe avant de repartir.']);if(has('exit'))return R('caution','Rejoins l’option confirmée avant la rupture','Quand l’eau devient limite, il vaut mieux réduire l’exposition tôt que pousser jusqu’à la panne complète.',['Confirme distance, terrain et chaleur jusqu’à la sortie.','Réduis l’allure et les arrêts au soleil.','Garde le groupe ensemble.','Arrête si vertige, confusion ou incapacité apparaissent.']);return R('info','Recalcule l’eau avant de décider','La situation manque d’un élément clé : quantité restante, distance, chaleur, source ou sortie.',['Compte l’eau disponible pour tout le groupe.','Évalue durée réelle avec chaleur et fatigue.','Identifie source, traitement, retour ou sortie.','Ne poursuis pas vers un secteur sec sans marge claire.']);}
function R(c,t,w,s){return typeof c==='object'?c:{c,t,w,s}}
const followupLabels={better:'La personne reparle normalement depuis 10 minutes',coldStill:'Elle reste froide, tremble ou répond lentement',coldWorse:'Confusion, somnolence, maladresse forte ou frissons incontrôlables',noProtect:'Aucune protection contre vent, pluie ou sol froid',footBetter:'Marche redevenue habituelle après protection du pied',footStill:'La douleur modifie encore la marche',footWorse:'La douleur augmente ou l’appui devient impossible',healthStill:'Symptômes encore présents sans amélioration nette',healthWorse:'Confusion, faiblesse marquée ou aggravation rapide',fixWorks:'Solution de secours testée et fonctionnelle',fixWeak:'Solution de secours fragile',fixFails:'Réparation ou redondance inutilisable',energyBetter:'Énergie ou attention revenue après petite prise',energyStill:'Faiblesse, nausée ou moral bas persistent',energyWorse:'Confusion, tremblements forts, chute ou impossibilité d’avancer',signalClose:'Point de réseau proche, visible ou déjà connu',signalRisk:'Chercher du réseau ajoute un risque',groupSheltered:'Groupe restant protégé avec une personne auprès du plus vulnérable',campWarm:'Personne isolée du sol et parole normale depuis 10 minutes',campColdStill:'Personne encore froide ou sans récupération',campColdWorse:'Confusion, somnolence ou frissons incontrôlables au camp',heatBetter:'Vertiges ou crampes diminuent après repos à l’ombre',heatStill:'Vertiges, crampes ou fatigue persistent',heatWorse:'Confusion, peau très chaude, malaise ou impossibilité de boire'}
function txt(x){return String(x).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function answerLabel(id){const qs=Object.values(questions).flat();const found=qs.find(q=>q&&q[0]===id);return found?found[1]:followupLabels[id]||id}
function selectedFacts(){const priority=['life','grave','hypo','heatStroke','flood','thunder','wetCold','coldStill','noProtect','healthStill','healthWorse','walk','worse','missing','blocked','noSignal','signalRisk','shelter','shelterShared','dry','shortOption','returnKnown','returnSafer','escapeKnown','escapeSafe','source','exit','treat'];const ids=[...new Set(priority.concat(state.answers))].filter(id=>state.answers.includes(id)&&!id.startsWith('_'));return ids.slice(0,6).map(answerLabel)}
function block(t,c,items){return{t,c,items:items.filter(Boolean)}}
function baseBlock(r){const map={stop:['D’abord','Stoppe l’action en cours, regroupe le groupe et traite le danger immédiat avant l’objectif.'],caution:['Avant de bouger','Ralentis, confirme que l’option choisie existe vraiment, puis avance par petits tronçons.'],info:['Reprendre les faits','Ne choisis pas encore une direction définitive. Pose le groupe, observe et cherche un point vérifiable.'],go:['Continuer utilement','Continue seulement tant que les conditions restent identiques et fixe tout de suite le prochain arrêt.']};const b=map[r.c];return block(b[0],r.c,[b[1]])}
function terrainOptionBlock(){if(['health','food','injury'].includes(state.section))return block('Avant de choisir retour ou sortie','info',['Vérifie que le retour reprend le même chemin sans torrent, crête ou passage exposé.','Vérifie qu’une sortie est localisée avec durée, distance, lumière et terrain connus.','Si aucune option simple n’est confirmée, stabilise sur place et prépare l’aide au lieu d’improviser.']);return null}
function resultBlocks(r){const bs=[baseBlock(r)];const s=state.section;
 if(s==='weather'){const protectedEnough=has('dry')||has('shelter')||has('shelterShared')||has('tentStable')||(has('siteOk')&&has('siteDrain'));if((has('wetCold')||has('cold')||has('rain')||has('wind')||has('shelterLost'))&&!protectedEnough)bs.push(block('Si aucune protection ne tient','stop',['Quitte seulement l’eau, le vent direct ou le sol froid si cela ne t’expose pas plus.','Utilise sacs, vêtements, sursac, poncho, tarp ou partage de couches pour couper le vent.','Isole du sol avec sac, corde, vêtements ou matelas partiel.','Si le froid persiste sans protection réelle, prépare sortie courte, aide ou appel.']));if(has('thunder')&&!has('shelter'))bs.push(block('Si aucun abri fermé n’est accessible','caution',['Ne vise pas une tente comme protection foudre.','Évite crête, col, plateau ouvert, eau, arbre isolé, clôture et point dominant.','Cherche une zone plus basse sans ravine ni berge, puis limite les déplacements.','Attends 30 minutes sans tonnerre avant toute activité exposée.']));if(!has('shortOption')&&!has('shelter')&&!has('shelterShared')&&!(has('returnKnown')&&has('returnSafer'))&&!(has('escapeKnown')&&has('escapeSafe')))bs.push(block('Option non confirmée','info',['Aucun abri, retour, sortie ou point sûr proche n’est confirmé dans tes réponses.','Avant de suivre une consigne de déplacement, identifie une option visible ou localisée.','Si aucune option n’apparaît et que le froid, l’eau ou l’orage progressent, prépare l’alerte.']))}
 if(s==='injury'){bs.push(block('Test ou déplacement','caution',['Teste la marche seulement sur terrain simple et quelques pas.','Si 20 pas sans aide ni trébuchement sont impossibles, ne tente pas une évacuation autonome longue.','Déplace seulement pour fuir un danger immédiat ou rejoindre une aide proche déjà confirmée.']));const o=terrainOptionBlock();if(o)bs.push(o)}
 if(s==='health'){bs.push(block('Terrain avant déplacement','caution',['Ne monte plus si altitude ou essoufflement sont en cause.','Descends seulement si le chemin est simple, connu, avec le groupe ensemble et assez de lumière.','Si la personne ne parle plus normalement, ne boit pas ou s’aggrave, bascule vers l’aide médicale.']));const o=terrainOptionBlock();if(o)bs.push(o)}
 if(s==='lost'){bs.push(block('Protocole STOP','info',['Stoppe le groupe, respire, observe, puis planifie avant tout déplacement.','Ne marche pas pendant que tu consultes carte ou téléphone.','Si le point actuel est dangereux, bouge seulement de quelques mètres ou minutes pour sortir du danger immédiat.']));if(has('dark')||!has('gps'))bs.push(block('Signalisation et attente','caution',['Économise batterie et lampe.','Rends le groupe visible ou audible sans te disperser.','Note dernier point certain, altitude, heure et direction supposée.']))}
 if(s==='gear'){const items=[];if(has('boot'))items.push('Chaussure : protège l’appui, solidarise la semelle et évite descente raide, boue, pierrier ou torrent.');if(has('light'))items.push('Lampe : fixe une heure limite et ne transforme pas le téléphone en éclairage principal long.');if(has('nav'))items.push('Navigation : retrouve deux indices concordants avant de repartir.');if(has('shelterLost'))items.push('Abri : remplace au moins vent, pluie et isolation du sol avant une nuit ou marche longue.');if(has('fixWeak')||has('fixFails'))items.push('Si le test faiblit ou échoue, raisonne comme si la fonction était perdue.');if(items.length)bs.push(block('Fonction touchée','caution',items))}
 if(s==='food'){bs.push(block('Inventaire commun','info',['Pose les réserves de tous les sacs ensemble.','Sépare ce qui se mange maintenant de ce qui demande cuisson, eau ou combustible.','Garde sel, eau et petite prise accessible pour la personne la plus faible.']));if(has('noAppetite')||has('energyStill')||has('energyWorse'))bs.push(block('Si aucune prise ne passe','stop',['Ne force pas si nausée forte, vomissements, confusion ou déglutition douteuse.','Traite la situation comme un problème santé, pas comme un simple rationnement.','Prépare aide, sortie courte ou appel si l’état ne revient pas.']));const o=terrainOptionBlock();if(o)bs.push(o)}
 if(s==='rescue'){bs.push(block('Informations à transmettre','info',['Position ou dernier point certain.','Nombre de personnes, état, évolution et heure du début du problème.','Météo, terrain, accès possible, batterie et moyen de rappel.']));if(!has('shelter'))bs.push(block('Si l’attente n’est pas protégée','stop',['Crée une protection minimale contre froid, pluie, soleil ou sol avant une longue attente.','Déplace le groupe seulement pour quitter un danger immédiat.','Garde une personne avec le blessé ou la personne la plus vulnérable.']));bs.push(block('Pendant l’attente','caution',['Rends le groupe visible ou audible.','Économise batterie, lampe et chaleur.','Surveille conscience, respiration, température, douleur et capacité à boire.']))}
 if(s==='bivouac'){if(!has('shelter')&&!has('shared'))bs.push(block('Abri de fortune','stop',['Coupe d’abord le vent, puis isole du sol, même imparfaitement.','Garde duvet, couche sèche, téléphone, lampe et chaussures protégés.','Réduis le volume exposé du groupe et partage les couches disponibles.']));if(has('hazard')||has('threat')||!has('drain'))bs.push(block('Si déplacer le camp est impossible','caution',['Renforce seulement ce qui réduit un risque immédiat.','Prépare chaussures, lampe, veste, téléphone et eau pour un départ rapide.','Signale ou appelle si eau, pierres, arbre, froid ou vent rendent l’attente non tenable.']));bs.push(block('Surveillance nuit','info',['Contrôle froid, condensation, écoulement, ancrages, odeurs et état humain.','Garde une issue de repli visible ou mémorisée.']))}
 if(s==='water'){if(has('heat'))bs.push(block('Si l’ombre manque','caution',['Crée de l’ombre avec vêtement, tarp, sac ou relief si possible.','Réduis charge, allure et exposition directe.','Attends une période plus fraîche si bouger maintenant aggrave les symptômes.']));if((has('none')||has('noSource')||has('heat'))&&!has('source')&&!has('exit'))bs.push(block('Si aucune eau, source ou sortie n’est confirmée','stop',['Ne poursuis pas vers une source supposée.','Stabilise à l’endroit le moins chaud et le moins exposé disponible.','Prépare aide ou appel si confusion, incapacité de marche ou rupture d’eau apparaissent.']));if(has('crossing'))bs.push(block('Franchissement','stop',['Ne traverse pas si le courant pousse fort, masque les appuis ou monte.','Cherche pont, détour, attente ou aide avant d’entrer dans l’eau.']))}
 bs.push(block('Surveille / change de décision','caution',['Aggravation, confusion, chute, vomissements, froid persistant, nuit ou terrain exposé annulent l’option prévue.','Réévalue au prochain point stable ou dans 10 à 20 minutes.']));return bs}
function renderFacts(){const facts=selectedFacts();return facts.length?`<div class="facts">${facts.map(f=>`<span class="fact">${txt(f)}</span>`).join('')}</div>`:''}
function renderBlocks(r){return `<div class="guide-blocks">${resultBlocks(r).map(b=>`<div class="guide-block ${b.c}"><b>${txt(b.t)}</b><ul>${b.items.map(i=>`<li>${txt(i)}</li>`).join('')}</ul></div>`).join('')}</div>`}
function showResult(r){const badge=r.c==='stop'?'ACTION PRIORITAIRE':r.c==='info'?'INFORMATION INSUFFISANTE':r.c==='caution'?'AVIS PRUDENT':'OPTION POSSIBLE';app.className=`result ${r.c}`;app.innerHTML=`<span class="badge">${badge}</span><h2>${txt(r.t)}</h2><div class="context"><b>Situation :</b> ${txt(contexts.find(c=>c[0]===state.context)[1])}</div>${renderFacts()}<div class="why">${txt(r.w)}</div>${renderBlocks(r)}<div class="group-title">Actions à cocher</div><div class="checklist">${r.s.map((x,i)=>`<label class="task"><input type="checkbox" data-task><span><b>${i+1}.</b> ${txt(x)}</span></label>`).join('')}</div><div class="progress"><div class="bar" id="bar"></div></div><div class="status" id="status">0 / ${r.s.length} actions</div><div class="actions"><button class="secondary" id="back">← Modifier</button><button class="primary" id="menu">Menu principal</button></div>`;const boxes=[...app.querySelectorAll('[data-task]')];boxes.forEach(b=>b.addEventListener('change',()=>{b.closest('.task').classList.toggle('done',b.checked);const n=boxes.filter(x=>x.checked).length;document.getElementById('bar').style.width=`${n/boxes.length*100}%`;document.getElementById('status').textContent=`${n} / ${boxes.length} actions`; }));document.getElementById('back').addEventListener('click',renderQuestions);document.getElementById('menu').addEventListener('click',renderMenu);}
renderMenu();
</script>
