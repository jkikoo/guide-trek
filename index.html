<style>
:root{--b:#123f57;--bg:#edf3f5;--card:#fff;--t:#182328;--m:#5d6d75;--line:#d5e0e4;--r:#8b1e1e;--o:#7a5300;--g:#1c5b3a;--i:#53606b;--gb:#e7f4ec}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:system-ui,-apple-system,sans-serif;line-height:1.47}main{max-width:880px;margin:auto;padding:14px 12px 42px}.hero,.card,.result,details{background:var(--card);border:1px solid var(--line);border-radius:16px}.hero,.card,.result{padding:16px}.hero h1{margin:0;color:var(--b)}.hero p{margin:8px 0}.eyebrow{font-size:.8rem;font-weight:850;color:var(--m);letter-spacing:.04em}.question{font-size:1.28rem;font-weight:850;color:var(--b);margin:5px 0}.help{color:var(--m);margin:0 0 14px}.menu,.choices,.checks,.checklist{display:grid;gap:10px}.menu{grid-template-columns:repeat(2,minmax(0,1fr))}.group{display:grid;gap:8px;margin-top:12px}.group-title{font-size:.82rem;font-weight:900;color:var(--b);text-transform:uppercase;letter-spacing:.04em}.group-note{margin:-3px 0 2px;color:var(--m);font-size:.92rem}.tile,.choice,.check,.task{border:1px solid var(--line);border-radius:13px;background:#f8fbfc}.tile,.choice{width:100%;font:inherit;text-align:left;padding:14px;color:var(--b);font-weight:800;cursor:pointer}.tile{min-height:112px}.tile .icon{font-size:1.45rem}.tile span,.choice span,.check small{display:block;font-weight:500;color:var(--m);margin-top:4px}.tile.active{background:#eef7f3;border-color:#b8d7c7}.tile.planned{background:#fbfbfc}.choice.unknown{background:#f2f0f7;color:#563d72}.check,.task{display:flex;gap:11px;align-items:flex-start;padding:12px;cursor:pointer}.check input,.task input{width:22px;height:22px;margin-top:2px;accent-color:var(--b)}.check strong{display:block}.actions{display:flex;gap:8px;margin-top:14px}.actions button{font:inherit;border:0;border-radius:12px;padding:11px 13px;font-weight:800;cursor:pointer}.primary{background:var(--b);color:#fff;flex:1}.secondary{background:#e8eef0;color:var(--m)}.result{border-left:7px solid var(--b)}.result.stop{border-color:var(--r)}.result.caution{border-color:var(--o)}.result.go{border-color:var(--g)}.result.info{border-color:var(--i)}.badge{display:inline-block;background:#e8eef0;border-radius:999px;padding:5px 9px;font-size:.78rem;font-weight:850}.result h2{color:var(--b);margin:8px 0 5px}.why{background:#f6f9fa;border-radius:12px;padding:11px;margin:10px 0}.checklist{margin-top:13px}.task.done{opacity:.56;text-decoration:line-through}.progress{height:9px;background:#e6ecef;border-radius:999px;overflow:hidden;margin:12px 0 5px}.bar{height:100%;background:var(--g);width:0;transition:.2s}.status{font-size:.87rem;color:var(--m);font-weight:750}.context{background:#eef4f7;border-left:5px solid var(--b);padding:10px 12px;border-radius:10px;margin:10px 0}.notice{background:#fff4d8;border-left:5px solid var(--o);padding:10px 12px;border-radius:10px;margin:10px 0}details{padding:0 14px;margin-top:11px}summary{padding:14px 0;font-weight:850;color:var(--b);cursor:pointer}a{color:var(--b)}@media(max-width:620px){.menu{grid-template-columns:1fr}.actions{flex-direction:column}}
.facts{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0}.fact{background:#eef4f7;border:1px solid var(--line);border-radius:999px;padding:6px 9px;font-size:.84rem;color:var(--b);font-weight:750}.guide-blocks{display:grid;gap:9px;margin:12px 0}.tip,.guide-block{border:1px solid var(--line);border-left:5px solid var(--b);border-radius:12px;background:#fbfdfd;padding:10px 11px}.tip b,.guide-block b{display:block;color:var(--b);margin-bottom:3px}.tip span,.guide-block li,.guide-block p{color:var(--m);font-size:.94rem}.guide-block ul{margin:6px 0 0;padding-left:18px}.tip.stop,.guide-block.stop{border-left-color:var(--r)}.tip.caution,.guide-block.caution{border-left-color:var(--o)}.tip.info,.guide-block.info{border-left-color:var(--i)}.tip.go,.guide-block.go{border-left-color:var(--g)}
</style>

<body>
<main>
<section class="hero"><h1>🧭 Guide trek</h1><p>Un avis terrain pour les situations difficiles en randonnée et en bivouac.</p><p>Réponds avec les faits observables. Le conseil proposé peut rester imparfait : l’objectif est de choisir la conduite la plus adaptée au réel.</p></section>
<section id="app" class="card"></section>
</main>
<script>
'use strict';
const app=document.getElementById('app');
const state={section:null,context:null,answers:[]};
const sections=[
 ['weather','🌧️','Pluie, vent ou orage','Recevoir un avis adapté à la situation météo.','active'],
 ['injury','🩹','Blessure','Douleur, chute, plaie, entorse ou impossibilité d’appui.','active'],

 ['camp','Bivouac installé','La tente ou l’abri est déjà en place.'],
 ['packing','Démontage en cours','Le camp est en train d’être rangé ou va l’être.'],
 ['unknown','Situation difficile à qualifier','La phase ou la meilleure option n’est pas claire.']
];
const questions={
 weather:[['thunder','Tonnerre entendu ou éclair visible'],['flood','Eau qui monte, torrent brun ou ruissellement concentré'],['hypo','Confusion, somnolence, maladresse forte ou frissons incontrôlables'],['visibility','Brouillard, nuit blanche ou visibilité trop faible pour lire le terrain'],['wetCold','Quelqu’un est trempé et froid, mais répond correctement'],['rain','Pluie continue ou qui s’intensifie'],['wind','Rafales fortes'],['cold','Quelqu’un est trempé, frissonne ou se refroidit'],['exposed','Crête, col, plateau ouvert ou passage où une chute serait grave'],['committed','Déjà engagé dans un passage où revenir ou s’arrêter est difficile'],['stablePoint','Vous voyez un endroit plat proche où tout le groupe peut s’arrêter'],['terrain','Sentier visible, appuis faciles et groupe encore ensemble'],['margin','La lumière restante couvre le trajet jusqu’au prochain point sûr avec marge'],['shortOption','Point sûr, abri, retour ou sortie visible ou confirmé à moins d’une heure'],['longOption','Option la plus proche à plus d’une heure'],['dry','Duvet, couche sèche, téléphone et batterie protégés'],['returnKnown','Retour connu jusqu’au dernier point sûr'],['returnSafer','Le retour reprend le même chemin sans torrent, crête ou passage exposé'],['escapeKnown','Sortie localisée avec durée, distance et chemin identifié'],['escapeSafe','Le chemin vers la sortie évite col, torrent et passage engagé'],['shelter','Bâtiment fermé ou véhicule accessible sans passage dangereux'],['shelterShared','Abri d’un autre groupe ou abri de fortune possible'],['shelterLost','Tente perdue, inutilisable ou couchage mouillé'],['siteOk','Site de bivouac hors ravine, berge, cuvette, crête, arbre menaçant et chute de pierres'],['siteDrain','Sol drainant avec une issue de repli possible'],['campThreat','Le camp est menacé par eau, pierres, arbre, pente ou ancrages qui cèdent'],['tentStable','Tente ancrée, couchage sec et matériel critique accessible'],['packingReady','Sac, navigation, vêtements et destination prêts avant démontage']],
 injury:[['grave','Inconscience, respiration anormale, saignement important ou traumatisme crânien','Signe grave observé maintenant.'],['spine','Chute avec douleur au dos, au cou, engourdissement ou faiblesse','Risque de lésion qui rend les déplacements dangereux.'],['walk','La personne ne marche pas 20 pas sans aide ou sans trébucher','Appui impossible, chute répétée ou marche très déséquilibrée.'],['blister','Ampoule, frottement ou douleur de pied qui modifie la marche','Gêne encore limitée mais qui peut empirer vite.'],['worse','La douleur ou l’état s’aggrave','Évolution nette malgré l’arrêt ou les premiers gestes.'],['exposed','Le terrain impose encore un passage exposé','Section où une chute aurait de fortes conséquences.'],['cold','La personne est mouillée ou se refroidit','Vêtements humides, frissons ou perte d’énergie.'],['help','Un refuge, une route ou une aide est visible ou localisé','Accès identifié sans passage plus dangereux.'],['shortOption','Sortie ou endroit stable identifié à moins d’une heure','Chemin décrit ou visible, pas seulement supposé.']],
 health:[['grave','Confusion, douleur thoracique, difficulté respiratoire, convulsion ou faiblesse d’un côté','Signe grave observé maintenant.'],['allergy','Gonflement du visage, gêne respiratoire ou réaction allergique rapide','Signe possible d’anaphylaxie.'],['vomit','Vomissements répétés ou impossibilité de boire','Hydratation ou récupération compromise.'],['heatStroke','Peau très chaude, confusion ou arrêt de la transpiration','Signe possible de coup de chaleur.'],['cold','Froid, vêtements mouillés ou frissons','Risque de refroidissement.'],['heat','Chaleur forte, vertiges, mal de tête ou crampes','Risque lié à la chaleur ou aux sels.'],['panic','Panique, anxiété forte ou jugement inhabituel','La personne ou le groupe ne décide plus normalement.'],['altitude','Mal de tête, nausée ou fatigue inhabituelle en altitude','Signe compatible avec le mal aigu des montagnes.'],['better','La personne parle normalement et garde eau ou nourriture depuis 10 minutes','Après arrêt, protection, boisson ou nourriture.'],['exposed','Le terrain devant est engagé ou exposé','Suite difficile à interrompre rapidement.']],
 lost:[['safe','Tout le groupe est arrêté hors crête, ravine, torrent et passage technique','Point où personne n’a besoin d’avancer pour rester debout.'],['last','Je connais le dernier point où ma position était certaine','Lieu identifiable sur carte, trace ou terrain.'],['return','Je peux revenir vers ce point par le même chemin','Sans couper hors sentier ni improviser.'],['gps','Carte, GPS et relief se recoupent','Au moins deux indices concordent.'],['conflict','Carte, GPS, balisage ou relief ne se recoupent pas','Les indices donnent des directions ou altitudes contradictoires.'],['offtrail','Le groupe est hors sentier sans l’avoir choisi','Plus de trace fiable ou retour visuel incertain.'],['blockedTrail','Sentier barré, effondré, noyé, fermé ou impraticable','Obstacle réel sur l’itinéraire prévu.'],['trail','Sentier ou balisage retrouvé devant moi','Continuité visible sans traverser un danger.'],['dark','La nuit approche ou la batterie est faible','Marge de navigation en baisse.'],['exposed','Le terrain autour est raide, boisé, barré ou traversé par des torrents','Erreur de direction difficile à corriger.'],['separated','Le groupe est séparé ou quelqu’un manque','La navigation devient aussi une recherche de personne.']],
 gear:[['critical','La panne touche l’abri, le couchage, les chaussures, la navigation, l’éclairage ou la communication','Fonction importante pour marcher ou passer la nuit.'],['shelterLost','Tente, tarp ou couchage perdu, trempé ou inutilisable','Protection de nuit compromise.'],['boot','Chaussure ou semelle défaillante','Appui, protection ou adhérence compromis.'],['nav','Carte, téléphone, GPS ou batterie inutilisable','Capacité de navigation réduite.'],['light','Frontale, lampe ou éclairage inutilisable','La marge chute vite si la nuit approche.'],['backup','Une solution de secours ou une redondance existe','Partage, réparation, autre appareil ou autre protection.'],['repair','La réparation prend moins de 10 minutes sur un endroit stable','Sans rester dans un passage exposé.'],['dark','La nuit ou le mauvais temps approche','La marge diminue.'],['exposed','La suite comporte un passage engagé','Terrain où une panne aggrave fortement le risque.'],['exit','Une sortie visible ou localisée est proche','Accès identifié et praticable.']],
 food:[['low','Nourriture insuffisante pour la durée restante','Déficit probable au-delà d’un simple repas.'],['far','Sortie, refuge ou ravitaillement à plusieurs heures ou jours','La durée restante dépasse la marge alimentaire.'],['lostFood','Nourriture perdue, mouillée, écrasée ou volée par un animal','Une partie de la réserve n’est plus disponible.'],['noCook','Les repas restants demandent cuisson, eau ou combustible indisponible','Réserve théorique mais pas immédiatement mangeable.'],['snacks','Aliments simples mangeables maintenant disponibles','Barres, fruits secs, noix, biscuits, fromage, salé ou sucré.'],['noAppetite','Pas faim, nausée ou difficulté à manger assez','La nourriture existe mais n’entre pas vraiment.'],['weak','Froid, faiblesse, tremblements, moral bas ou jugement qui baisse','Le manque d’énergie affecte déjà le groupe.'],['share','Partage des réserves possible dans le groupe','Les quantités sont inégales mais mutualisables.'],['exit','Sortie, refuge, route, aide ou ravitaillement proche et confirmé','Option concrète avant rupture énergétique.'],['unsafe','Nourriture avariée, souillée, ouverte ou suspecte','Risque digestif ou sanitaire.'],['animalRisk','Odeurs, déchets ou nourriture ouverte près du couchage','Risque animal ou camp non stabilisé.']],
 rescue:[['life','Inconscience, respiration anormale, traumatisme grave ou saignement important','Signe grave observé maintenant.'],['blocked','Aucune route, sentier ou retour identifié ne permet au groupe de partir ensemble','Aucune sortie autonome claire.'],['walk','Une personne ne marche pas 20 pas sans aide ou sans trébucher','Déplacement autonome compromis.'],['worse','L’état se dégrade malgré les premières mesures','Évolution défavorable.'],['missing','Une personne est séparée ou introuvable','Le groupe ne sait pas où elle est ni si elle peut rejoindre.'],['noSignal','Pas de réseau téléphonique exploitable','L’appel direct est impossible maintenant.'],['messenger','Balise, InReach, radio ou autre moyen d’alerte disponible','Communication possible sans réseau mobile.'],['position','La position est connue avec coordonnées ou repères','Information utile à transmettre.'],['battery','Le téléphone a assez de batterie ou une autre communication existe','Moyen de rester joignable.'],['shelter','Vêtements, isolation du sol, eau et lampe disponibles pour attendre','Protection possible pendant l’attente.']],
 bivouac:[['hazard','Site dans une ravine, berge, cuvette, crête, pied de pente, arbre menaçant ou chute de pierres','Le lieu expose à un danger supérieur.'],['drain','Le sol n’a pas d’eau stagnante et une sortie de repli est visible','L’eau s’évacue et le groupe peut bouger.'],['wind','Vent fort ou ancrages difficiles','La tenue de l’abri est incertaine.'],['cold','Quelqu’un est froid, mouillé ou épuisé','Le bivouac doit d’abord protéger les personnes.'],['shelter','Tente, tarp ou abri utilisable maintenant','Protection réelle disponible.'],['shared','Abri partagé ou protection de fortune montable avec le matériel présent','Tarp, sursac, poncho, couverture, auvent ou partage temporaire.'],['animalSigns','Traces, odeurs, restes, nourriture ouverte ou activité animale proche','Le site peut attirer ou retenir un animal.'],['foodSecure','Nourriture, déchets et objets odorants peuvent être isolés du couchage','Stockage possible selon le terrain et les règles locales.'],['water','Eau, frontale, chaussures et téléphone accessibles','Matériel critique prêt si le camp doit bouger.'],['threat','Camp déjà menacé ou ancrages qui cèdent','Rester peut devenir plus dangereux que déplacer.']],
 water:[['none','Il reste moins d’une heure d’eau pour le groupe','Réserve faible selon chaleur, effort et distance.'],['noSource','Aucun point d’eau confirmé avant plusieurs heures','Source absente, sèche, trop loin ou seulement supposée.'],['lastWater','Dernier point d’eau connu atteignable par un retour praticable','Retour réel, sans passage plus dangereux.'],['dryStretch','Section sèche longue devant le groupe','Distance ou durée qui impose de recalculer la réserve avant d’avancer.'],['heat','Chaleur forte, gorge sèche, crampes, vertiges ou fatigue inhabituelle','Risque de déshydratation ou coup de chaleur.'],['overdrink','Beaucoup d’eau bue avec peu de sel ou nourriture, maux de tête ou nausée','Risque possible de déséquilibre en sels.'],['source','Source, neige ou eau visible à proximité','Ressource potentielle à vérifier.'],['badWater','Eau stagnante, algues, odeur, carcasse ou contamination visible','Risque sanitaire supérieur à une source claire.'],['treat','Filtre, pastilles, ébullition ou autre traitement disponible','Réduction du risque sanitaire.'],['crossing','Torrent, rivière rapide, eau trouble ou niveau qui monte à franchir','Passage aquatique dangereux.'],['bridge','Pont, détour ou attente possible hors d’eau','Alternative au franchissement.'],['exit','Sortie, refuge ou aide proche et confirmée','Option qui réduit l’exposition.']]
};
function title(step,q,h){return `<div class="eyebrow">${step}</div><div class="question">${q}</div><p class="help">${h}</p>`}
function renderMenu(){state.section=null;state.context=null;state.answers=[];app.className='card';app.innerHTML=title('MENU PRINCIPAL','Que veux-tu gérer maintenant ?','Choisis le problème principal. Tu pourras revenir au menu à tout moment.')+`<div class="menu">${sections.map(s=>`<button class="tile ${s[4]}" data-section="${s[0]}"><div class="icon">${s[1]}</div>${s[2]}<span>${s[3]}</span></button>`).join('')}</div>`;app.querySelectorAll('[data-section]').forEach(b=>b.addEventListener('click',()=>{state.section=b.dataset.section;renderContext()}));}
function renderContext(){app.className='card';app.innerHTML=title('ÉTAPE 1 — CONTEXTE','Quelle est la situation actuelle ?','Choisis ce qui décrit le mieux le moment présent, sans décider encore quoi faire.')+`<div class="choices">${contexts.map(c=>`<button class="choice ${c[0]==='unknown'?'unknown':''}" data-context="${c[0]}">${c[1]}<span>${c[2]}</span></button>`).join('')}</div><div class="actions"><button class="secondary" id="menu">← Menu</button></div>`;app.querySelectorAll('[data-context]').forEach(b=>b.addEventListener('click',()=>{state.context=b.dataset.context;state.answers=[];renderQuestions()}));document.getElementById('menu').addEventListener('click',renderMenu);}
function renderQuestions(){if(state.section==='weather')return renderWeatherQuestions();const groups=questionGroups();if(groups)return renderGroupedQuestions(groups);const qs=questions[state.section];if(!qs){renderOutline();return}app.className='card';app.innerHTML=title('ÉTAPE 2 — FAITS','Que constates-tu ?','Coche seulement ce que tu observes ou sais confirmer.')+`<div class="context"><b>Contexte :</b> ${contexts.find(c=>c[0]===state.context)[1]}</div><div class="checks">${qs.map(q=>`<label class="check"><input type="checkbox" value="${q[0]}" ${state.answers.includes(q[0])?'checked':''}><span><strong>${q[1]}</strong><small>${q[2]}</small></span></label>`).join('')}</div><div class="actions"><button class="secondary" id="back">← Retour</button><button class="primary" id="go">Continuer →</button></div>`;app.querySelectorAll('input[type=checkbox]').forEach(i=>i.addEventListener('change',()=>{state.answers=[...app.querySelectorAll('input:checked')].map(x=>x.value)}));document.getElementById('back').addEventListener('click',renderContext);document.getElementById('go').addEventListener('click',continueFromQuestions);}
function renderGroupedQuestions(groups){app.className='card';app.innerHTML=title('ÉTAPE 2 — FAITS','Que constates-tu ?','Coche seulement ce que tu observes ou sais confirmer.')+`<div class="context"><b>Contexte :</b> ${contexts.find(c=>c[0]===state.context)[1]}</div>${groups.map(g=>`<div class="group"><div class="group-title">${g.t}</div>${g.n?`<p class="group-note">${g.n}</p>`:''}<div class="checks">${g.q.map(q=>`<label class="check"><input type="checkbox" value="${q[0]}" ${state.answers.includes(q[0])?'checked':''}><span><strong>${q[1]}</strong><small>${q[2]}</small></span></label>`).join('')}</div></div>`).join('')}<div class="actions"><button class="secondary" id="back">← Retour</button><button class="primary" id="go">Continuer →</button></div>`;app.querySelectorAll('input[type=checkbox]').forEach(i=>i.addEventListener('change',()=>{state.answers=[...app.querySelectorAll('input:checked')].map(x=>x.value)}));document.getElementById('back').addEventListener('click',renderContext);document.getElementById('go').addEventListener('click',continueFromQuestions);}
function q(section,ids){return ids.map(id=>questions[section].find(x=>x[0]===id)).filter(Boolean)}
function continueFromQuestions(){const followup=followupStep();if(followup)return renderFollowupQuestions(followup);decide();}
function followupStep(){if(state.section==='weather'&&has('wetCold')&&!has('thunder')&&!has('flood')&&!has('hypo')&&!has('_weatherColdChecked'))return{done:'_weatherColdChecked',step:'ÉTAPE 3 — FROID',question:'Après arrêt et protection, que constates-tu ?',help:'Tu as indiqué une personne trempée et froide. Coche les faits observés après coupe-vent, isolation ou couche sèche.',groups:[{t:'Évolution de la personne',q:[['better','Elle reparle normalement depuis 10 minutes','Réponses cohérentes, voix normale, pas seulement une phrase isolée.'],['coldStill','Elle reste froide, tremble ou répond lentement','Pas d’amélioration nette après protection.'],['coldWorse','Confusion, somnolence, maladresse forte ou frissons incontrôlables','Signe rouge : ne pas attendre la suite du questionnaire.']]},{t:'Protection réelle',q:[['noProtect','Aucune protection contre vent, pluie ou sol froid n’est en place','Pas d’abri, pas d’isolation du sol, pas de couche sèche utilisable.']]}]};if(state.section==='injury'&&has('blister')&&!has('grave')&&!has('spine')&&!has('walk')&&!has('worse')&&!has('_injuryFootChecked'))return{done:'_injuryFootChecked',step:'ÉTAPE 3 — PIED',question:'Après protection du pied, que constates-tu ?',help:'Tu as indiqué une ampoule ou douleur de pied. Coche seulement après arrêt, séchage, protection ou ajustement.',groups:[{t:'Test court',q:[['footBetter','La personne fait quelques pas avec une marche redevenue habituelle','Sur terrain simple, sans boiterie nouvelle.'],['footStill','La douleur modifie encore la marche','Boiterie, appui évité ou rythme nettement ralenti.'],['footWorse','La douleur augmente vite ou l’appui devient impossible','La marche se dégrade malgré la protection.']]}]};if(state.section==='health'&&(has('cold')||has('heat')||has('panic')||has('altitude'))&&!has('grave')&&!has('allergy')&&!has('heatStroke')&&!has('vomit')&&!has('_healthChecked'))return{done:'_healthChecked',step:'ÉTAPE 3 — ÉVOLUTION',question:'Après un court arrêt, que constates-tu ?',help:'Tu as indiqué un signe humain. Coche les faits observés après repos, protection, ombre ou chaleur selon le cas.',groups:[{t:'Réévaluation courte',q:[['better','La personne parle normalement et garde eau ou nourriture depuis 10 minutes','Réponses cohérentes et pas de vomissement immédiat.'],['healthStill','Symptômes encore présents sans amélioration nette','Vertige, nausée, froid, panique ou mal de tête persistent.'],['healthWorse','Confusion, faiblesse marquée, essoufflement au repos ou aggravation rapide','Signe rouge : l’autonomie devient incertaine.']]}]};if(state.section==='gear'&&(has('backup')||has('repair'))&&!has('_gearTested'))return{done:'_gearTested',step:'ÉTAPE 3 — TEST',question:'La solution de secours tient-elle vraiment ?',help:'Tu as indiqué une réparation ou une redondance. Coche seulement après un test court, sur un endroit stable.',groups:[{t:'Test de fonction',q:[['fixWorks','La solution fonctionne après test court','Lampe allumée, chaussure tenue, navigation lisible, abri ou communication utilisable.'],['fixWeak','La solution tient seulement quelques minutes ou reste fragile','Elle peut dépanner mais ne doit pas porter une longue section.'],['fixFails','La réparation lâche ou la redondance ne fonctionne pas','La fonction critique reste perdue.']]}]};if(state.section==='food'&&(has('weak')||has('noAppetite'))&&has('snacks')&&!has('_foodEnergyChecked'))return{done:'_foodEnergyChecked',step:'ÉTAPE 3 — ÉNERGIE',question:'Après une petite prise alimentaire, que constates-tu ?',help:'Tu as indiqué faiblesse ou difficulté à manger. Coche seulement après un arrêt calme et une prise adaptée si elle est possible.',groups:[{t:'Évolution après 10 minutes',q:[['energyBetter','La personne reparle normalement et reprend un rythme lent','Énergie ou attention revenue de façon visible.'],['energyStill','Faiblesse, nausée ou moral bas persistent','Pas d’amélioration nette après la prise.'],['energyWorse','Confusion, tremblements forts, chute ou impossibilité d’avancer','Signe rouge : ne pas traiter comme simple faim.']]}]};if(state.section==='rescue'&&has('noSignal')&&!has('messenger')&&!has('_signalChecked'))return{done:'_signalChecked',step:'ÉTAPE 3 — SIGNAL',question:'Chercher du réseau ajoute-t-il un risque ?',help:'Tu as indiqué l’absence de réseau direct. Coche seulement ce qui est visible ou déjà connu.',groups:[{t:'Déplacement pour alerter',q:[['signalClose','Un point de réseau est proche, visible ou déjà connu','Trajet court, sans passage exposé, avec retour fixé.'],['signalRisk','Chercher du réseau impose crête, torrent, nuit, hors sentier ou séparation floue','Le déplacement peut créer une deuxième urgence.'],['groupSheltered','Le groupe restant a abri, eau, lumière et une personne qui reste avec le plus vulnérable','Condition minimale avant d’envoyer quelqu’un.']]}]};if(state.section==='bivouac'&&has('cold')&&!has('_bivouacColdChecked'))return{done:'_bivouacColdChecked',step:'ÉTAPE 3 — FROID',question:'Après installation ou renforcement, que constates-tu ?',help:'Tu as indiqué une personne froide, mouillée ou épuisée au bivouac.',groups:[{t:'Évolution de la personne',q:[['campWarm','La personne est isolée du sol et reparle normalement depuis 10 minutes','Couchage ou couche sèche en place, vent coupé.'],['campColdStill','Elle reste froide, tremble ou ne récupère pas','Le camp ne protège pas encore assez.'],['campColdWorse','Confusion, somnolence, maladresse forte ou frissons incontrôlables','Signe rouge : ne pas attendre dans ce camp sans aide.']]}]};if(state.section==='water'&&has('heat')&&!has('heatStroke')&&!has('_waterHeatChecked'))return{done:'_waterHeatChecked',step:'ÉTAPE 3 — CHALEUR',question:'Après ombre et baisse d’effort, que constates-tu ?',help:'Tu as indiqué chaleur, crampes, vertiges ou fatigue inhabituelle.',groups:[{t:'Évolution après arrêt',q:[['heatBetter','Vertiges ou crampes diminuent après repos à l’ombre','La personne parle normalement et peut boire par petites prises.'],['heatStill','Vertiges, crampes ou fatigue persistent','Pas d’amélioration nette après baisse d’effort.'],['heatWorse','Confusion, peau très chaude, malaise ou impossibilité de boire','Signe rouge : risque lié à la chaleur.']]}]};return null;}
function renderFollowupQuestions(f){const ids=f.groups.flatMap(g=>g.q.map(x=>x[0]));app.className='card';app.innerHTML=title(f.step,f.question,f.help)+`<div class="context"><b>Contexte :</b> ${contexts.find(c=>c[0]===state.context)[1]}</div>${f.groups.map(g=>`<div class="group"><div class="group-title">${g.t}</div><div class="checks">${g.q.map(q=>`<label class="check"><input type="checkbox" value="${q[0]}" ${state.answers.includes(q[0])?'checked':''}><span><strong>${q[1]}</strong><small>${q[2]}</small></span></label>`).join('')}</div></div>`).join('')}<div class="actions"><button class="secondary" id="back">← Retour</button><button class="primary" id="go">Continuer →</button></div>`;app.querySelectorAll('input[type=checkbox]').forEach(i=>i.addEventListener('change',()=>{const checked=[...app.querySelectorAll('input:checked')].map(x=>x.value);state.answers=state.answers.filter(x=>!ids.includes(x)).concat(checked)}));document.getElementById('back').addEventListener('click',()=>{state.answers=state.answers.filter(x=>x!==f.done);renderQuestions()});document.getElementById('go').addEventListener('click',()=>{state.answers=state.answers.filter(x=>x!==f.done).concat(f.done);continueFromQuestions()});}
function questionGroups(){const c=state.context,s=state.section;if(s==='injury'){const danger={t:'Signes graves',q:q(s,['grave','spine'])};const move={t:'Déplacement',q:q(s,['walk','blister','worse','exposed'])};const env={t:'Protection et aide',q:q(s,['cold','help','shortOption'])};return [danger,move,env]}if(s==='health'){const danger={t:'Signes graves',q:q(s,['grave','allergy','heatStroke','vomit'])};const causes={t:'Contexte humain',q:q(s,['cold','heat','panic','altitude'])};const terrain={t:'Suite de l’itinéraire',q:q(s,['exposed'])};return c==='camp'||c==='arrived'?[danger,causes]:[danger,causes,terrain]}if(s==='lost'){const safety={t:'Point de sécurité',q:q(s,['safe','separated'])};const position={t:'Repères',q:q(s,['last','gps','conflict','offtrail','blockedTrail','trail'])};const options={t:'Options de déplacement',q:q(s,['return','dark','exposed'])};return [safety,position,options]}if(s==='gear'){const critical={t:'Fonction touchée',q:q(s,['critical','shelterLost','boot','nav','light'])};const solution={t:'Solution possible',q:q(s,['backup','repair','exit'])};const risk={t:'Marge et terrain',q:q(s,['dark','exposed'])};return [critical,solution,risk]}if(s==='food'){const stock={t:'Réserve réelle',q:q(s,['low','far','lostFood','unsafe'])};const usable={t:'Mangeable maintenant',q:q(s,['snacks','noCook','noAppetite','weak'])};const options={t:'Options et camp',q:q(s,['share','exit','animalRisk'])};return [stock,usable,options]}if(s==='rescue'){const trigger={t:'Motif possible',q:q(s,['life','blocked','walk','worse','missing'])};const call={t:'Appel et attente',q:q(s,['noSignal','messenger','position','battery','shelter'])};return [trigger,call]}if(s==='bivouac'){const site={t:'Site',q:q(s,['hazard','drain'])};const shelter={t:'Protection',q:q(s,['shelter','shared','wind','cold','animalSigns','foodSecure'])};const camp={t:'Camp et départ',q:q(s,['water','threat'])};return c==='continue'||c==='return'||c==='escape'?[shelter,camp]:[site,shelter,camp]}if(s==='water'){const human={t:'État humain et réserve',q:q(s,['none','noSource','dryStretch','heat','overdrink'])};const resource={t:'Eau disponible',q:q(s,['source','lastWater','badWater','treat','exit'])};const crossing={t:'Franchissement',q:q(s,['crossing','bridge'])};return [human,resource,crossing]}return null}
function renderWeatherQuestions(){const groups=weatherQuestionGroups();app.className='card';app.innerHTML=title('ÉTAPE 2 — FAITS MÉTÉO','Que constates-tu maintenant ?','Coche seulement ce qui est vrai. Laisse vide ce qui est incertain.')+`<div class="context"><b>Contexte :</b> ${contexts.find(c=>c[0]===state.context)[1]}</div>${groups.map(g=>`<div class="group"><div class="group-title">${g.t}</div>${g.n?`<p class="group-note">${g.n}</p>`:''}<div class="checks">${g.q.map(q=>`<label class="check"><input type="checkbox" value="${q[0]}" ${state.answers.includes(q[0])?'checked':''}><span><strong>${q[1]}</strong>${q[2]?`<small>${q[2]}</small>`:''}</span></label>`).join('')}</div></div>`).join('')}<div class="actions"><button class="secondary" id="back">← Retour</button><button class="primary" id="go">Continuer →</button></div>`;app.querySelectorAll('input[type=checkbox]').forEach(i=>i.addEventListener('change',()=>{state.answers=[...app.querySelectorAll('input:checked')].map(x=>x.value)}));document.getElementById('back').addEventListener('click',renderContext);document.getElementById('go').addEventListener('click',continueFromQuestions);}
function weatherQuestionGroups(){const c=state.context;const danger={t:'Signes présents',n:'Coche les signes observés maintenant.',q:[['thunder','Tonnerre entendu ou éclair visible','Même lointain ou intermittent.'],['flood','Eau qui monte, torrent brun ou ruissellement concentré','Autour du sentier, du camp ou d’un passage à franchir.'],['hypo','Confusion, somnolence, maladresse forte ou frissons incontrôlables','Chez toi ou quelqu’un du groupe.']]};const meteo={t:'Météo, froid et matériel',q:[['rain','Pluie continue ou qui s’intensifie','Depuis plusieurs minutes ou avec une tendance nette.'],['wind','Rafales fortes','Assez fortes pour gêner l’équilibre, le montage ou les ancrages.'],['visibility','Brouillard, nuit blanche ou visibilité trop faible pour lire le terrain','Repères, relief ou balisage difficiles à confirmer.'],['wetCold','Quelqu’un est trempé et froid, mais répond correctement','La personne répond à une question simple et peut se tenir debout.'],['dry','Duvet, couche sèche, téléphone et batterie sont protégés','Dans un sac étanche ou réellement à l’abri.']]};const abri={t:'Protection utilisable',n:'Décris seulement ce qui existe et semble atteignable.',q:[['shelter','Bâtiment fermé ou véhicule accessible','Sans franchir un passage plus exposé.'],['shelterShared','Abri d’un autre groupe ou protection de fortune montable avec le matériel présent','Tarp, sursac, cabane ouverte, auvent, partage temporaire.'],['shelterLost','Tente perdue, inutilisable ou couchage mouillé','L’abri ou le sommeil protégé n’est plus garanti.']]};const route={t:'Terrain et engagement',q:[['terrain','Sentier visible, appuis faciles et groupe encore ensemble','Position confirmée par carte, trace ou balisage.'],['exposed','Crête, col, plateau ouvert ou passage à chute grave','Section où une erreur aurait de fortes conséquences.'],['committed','Déjà engagé dans un passage où revenir ou s’arrêter est difficile','Le demi-tour ou l’attente sur place exposerait aussi le groupe.'],['stablePoint','Vous voyez un endroit plat proche où tout le groupe peut s’arrêter','Endroit pour se regrouper, se couvrir et réévaluer.']]};const margin={t:'Temps et distance',q:[['margin','La lumière restante couvre le trajet jusqu’au prochain point sûr avec marge','Durée estimée avec le rythme actuel du groupe, pas au rythme prévu.'],['shortOption','Point sûr, abri, retour ou sortie visible ou confirmé à moins d’une heure','Durée estimée sur le rythme actuel du groupe.'],['longOption','Option la plus proche à plus d’une heure','Aucune solution proche confirmée.']]};const ret={t:'Chemin déjà parcouru',q:[['returnKnown','Retour connu jusqu’au dernier point sûr','Trajet réellement identifié, sans raccourci supposé.'],['returnSafer','Le retour reprend le même chemin sans torrent, crête ou passage exposé','Selon le terrain maintenant, pas seulement selon le souvenir.']]};const esc={t:'Sortie possible',q:[['escapeKnown','Sortie localisée avec durée, distance et chemin identifié','Route, vallée, refuge ou village localisé.'],['escapeSafe','Le chemin vers la sortie évite col, torrent et passage engagé','Pas de point dur majeur identifié sur l’accès.']]};const site={t:'Lieu de bivouac',n:'À cocher seulement après observation du lieu.',q:[['siteOk','Lieu hors ravine, berge, cuvette, crête, arbre menaçant et chute de pierres','Pas dans l’axe évident d’un danger.'],['siteDrain','Le sol n’a pas d’eau stagnante et une sortie de repli est visible','L’eau peut s’évacuer et le groupe peut bouger.']]};const camp={t:'État du camp',q:[['campThreat','Camp menacé par eau, pierres, arbre, pente ou ancrages qui cèdent','Danger actuel ou signes d’aggravation.'],['tentStable','Tente ancrée, couchage sec et matériel critique accessible','Abri en place et équipement vital disponible.']]};const packing={t:'Avant de démonter',q:[['packingReady','Sac, navigation, vêtements et destination prêts','Le groupe pourrait partir sans chercher le matériel essentiel.']]};if(c==='arrived')return [danger,meteo,abri,site,margin];if(c==='camp')return [danger,meteo,abri,camp,margin];if(c==='packing')return [danger,meteo,abri,camp,packing,margin];if(c==='return')return [danger,meteo,abri,ret,route,margin];if(c==='escape')return [danger,meteo,abri,esc,route,margin];if(c==='near')return [danger,meteo,abri,route,margin,ret,esc,site];if(c==='unknown')return [danger,meteo,abri,route,margin,ret,esc,site];return [danger,meteo,abri,route,margin,ret,esc];}
function renderOutline(){app.className='result caution';app.innerHTML=`<span class="badge">SECTION INITIÉE</span><h2>Arbre en cours de construction</h2><p>Le menu et la doctrine sont prêts. Cette section sera développée avec le même ordre : contexte stratégique, dangers immédiats, options réellement ouvertes, checklist et stabilisation.</p><div class="actions"><button class="secondary" id="menu">← Menu</button></div>`;document.getElementById('menu').addEventListener('click',renderMenu);}
function has(x){return state.answers.includes(x)}
function decide(){let r;if(state.section==='weather')r=weatherDecision();else if(state.section==='injury')r=injuryDecision();else if(state.section==='health')r=healthDecision();else if(state.section==='lost')r=lostDecision();else if(state.section==='gear')r=gearDecision();else if(state.section==='food')r=foodDecision();else if(state.section==='rescue')r=rescueDecision();else if(state.section==='bivouac')r=bivouacDecision();else r=waterDecision();showResult(r);}
function weatherDecision(){
 const walking=['continue','return','escape','near','unknown'].includes(state.context);
 const siteReady=has('siteOk')&&has('siteDrain');
 const returnOpen=has('returnKnown')&&has('returnSafer');
 const escapeOpen=has('escapeKnown')&&has('escapeSafe');
 const protectedEnough=has('dry')||has('shelter')||has('shelterShared')||siteReady||has('tentStable');
 const nearHelp=has('shortOption')||has('shelter')||has('shelterShared');
 const extendedExposure=has('longOption')&&!has('shortOption');
 const canContinue=has('terrain')&&has('margin')&&has('dry')&&!has('thunder')&&!has('flood')&&!has('hypo')&&!has('wetCold')&&!has('visibility')&&!has('exposed')&&!has('committed')&&!has('shelterLost');
 const weatherLoad=['rain','wind','wetCold','visibility','exposed','thunder','shelterLost'].filter(has).length;
 if(has('coldWorse'))return R('stop','Traite le refroidissement comme l’urgence principale','La réévaluation montre un signe rouge : confusion, somnolence, maladresse forte ou frissons incontrôlables. La météo a déjà créé un problème humain prioritaire.',['Arrête l’objectif et coupe vent, pluie et contact avec le sol froid.','Remplace ou isole les vêtements mouillés sans exposer davantage la personne.','Réchauffe surtout tronc, cou et tête.','Prépare position, évolution et moyens d’alerte.','Appelle les secours si le signe persiste ou si la protection ne permet pas de réchauffer.']);
 if(has('wetCold')&&(has('coldStill')||has('noProtect')))return R(nearHelp?'caution':'stop','Réduis le froid avant toute option longue','La personne trempée et froide ne récupère pas nettement, ou la protection réelle manque encore. La suite doit d’abord réduire pluie, vent et contact avec le sol.',['Arrête le groupe hors eau et hors exposition si quelques mètres suffisent.','Cherche ou improvise une coupure du vent et de la pluie avec abri, vêtement, sursac, tarp, sac ou partage.','Isole la personne du sol avec ce qui existe, même imparfaitement.','Donne boisson ou nourriture seulement si elle avale normalement.','Si aucune protection ne tient, prépare sortie courte, aide ou appel sans viser une longue marche.']);
 if(has('wetCold')&&has('better'))return R('caution','Repars seulement vers une option courte et contrôlée','La personne trempée et froide répond mieux après protection, mais la météo a déjà créé une limite humaine. L’amélioration autorise surtout une sortie simple, pas une poursuite ambitieuse.',['Garde coupe-vent, isolation et couche sèche en place.','Reste sur terrain facile et groupe compact.','Vise abri, retour, sortie ou point sûr confirmé.','Évite crête, torrent, hors sentier et attente sans protection.','Réévalue dès que parole, marche, frissons ou pluie changent.']);
 if(has('flood'))return R('stop','Quitte la zone basse avant toute autre action','Une montée d’eau, un torrent brun ou un ruissellement concentré rend les choix ordinaires trop fragiles : la priorité est de sortir de l’axe de l’eau, même si du matériel reste exposé.',['Éloigne-toi du torrent, de la ravine, de la berge, du lit sec ou de la cuvette.','Gagne un terrain plus haut par un passage stable, sans traverser l’eau.','Ne tente pas de récupérer une tente ou un sac si cela te remet dans l’axe de l’eau.','Regroupe les personnes et vérifie froid, blessure, téléphone et lampe.','Une fois hors d’atteinte de l’eau, compare retour, échappatoire et bivouac possible.']);
 if(has('hypo'))return R('stop','Traite le refroidissement comme l’urgence principale','Confusion, somnolence, maladresse forte ou frissons incontrôlables indiquent que la marche normale n’est plus une solution fiable.',['Arrête l’objectif et réduis vent, pluie et contact avec le sol froid avec ce qui existe.','Crée ou rejoins une protection viable seulement si cela ne l’expose pas davantage.','Remplace ou isole le mouillé, réchauffe surtout tronc, cou et tête.','Appelle les secours si confusion, somnolence, aggravation ou impossibilité de se réchauffer.','Ne repars que si la personne redevient lucide, stable et chaude.']);
 if(has('thunder')&&has('shelter'))return R('stop','Rejoins l’abri fermé maintenant','Un bâtiment fermé ou un véhicule à toit rigide est supérieur à la tente et à toute poursuite exposée.',['Quitte crête, col, plateau, eau, arbre isolé, clôture et point dominant.','Rejoins l’abri sans emprunter un passage plus dangereux.','Reste loin des ouvertures et des éléments conducteurs.','Ne reprends une activité exposée qu’après 30 minutes sans tonnerre.']);
 if(has('thunder')&&has('committed')&&has('stablePoint'))return R('caution','Rejoins le prochain point stable, pas forcément le point de départ','Le demi-tour n’est pas automatiquement meilleur si le groupe est déjà engagé. L’avis est de réduire l’exposition jusqu’au point stable le plus proche, puis de réévaluer.',['Avance ou recule seulement jusqu’au point stable le moins exposant.','Évite point haut, eau, arbre isolé, clôture et arête.','Espace le groupe si le terrain le permet.','Au point stable, compare retour, échappatoire et attente sans présumer qu’un choix est idéal.','Ne reprends un passage exposé qu’après 30 minutes sans tonnerre.']);
 if(has('thunder')&&walking)return R('stop','Sors d’abord de l’exposition foudre','Avec du tonnerre, l’objectif, le bivouac prévu et la vitesse de progression passent après la sortie des zones exposées.',['Quitte immédiatement crête, col, plateau ouvert, eau, berge, arbre isolé et clôture.','Descends vers la position la moins exposée accessible sans traversée dangereuse.','Espace le groupe si le terrain le permet et limite les objets métalliques manipulés.','Compare ensuite seulement retour, échappatoire ou bivouac de repli.','Ne reprends un passage exposé qu’après 30 minutes sans tonnerre.']);
 if(has('visibility')&&walking&&!has('terrain'))return R('info','Reprends les repères avant de poursuivre','Une visibilité trop faible rend les bons choix fragiles : distance, pente, balisage et obstacles peuvent être mal lus.',['Si un point stable est visible, arrête-toi hors eau et hors exposition ; sinon avance seulement jusqu’au premier arrêt possible.','Vérifie position, direction, prochain point certain et heure.','Évite crête, torrent, hors sentier et passage engagé.','Choisis retour, attente protégée ou sortie confirmée seulement si cette option est identifiable.']);
 if(has('wetCold')&&!has('better')&&!protectedEnough)return R(nearHelp?'caution':'stop','Réduis le froid avant toute option longue','La personne est encore lucide, mais pluie, vent ou vêtements mouillés peuvent faire basculer la situation. Une marche longue sans protection fiable devient une mauvaise hypothèse.',['Coupe le vent et la pluie, même avec une solution imparfaite.','Isole du sol et remplace ou protège ce qui est mouillé.','Donne nourriture et boisson si la personne avale normalement.','Choisis seulement une option proche et confirmée si elle réduit l’exposition.','Appelle de l’aide si l’état ne s’améliore pas ou si aucune protection n’est possible.']);
 if(has('shelterLost')&&has('shelterShared'))return R('caution','Utilise l’abri disponible, même imparfait','La perte de tente ne décide pas à elle seule du demi-tour. Une protection partagée ou de fortune peut être la meilleure manière de reprendre de la marge avant de choisir la suite.',['Protège d’abord la personne froide, le téléphone, la batterie et les couches sèches.','Regroupe le matériel critique encore sec.','Demande ou organise le partage d’abri sans disperser le groupe.','Évalue ensuite retour, échappatoire ou nuit écourtée selon distance, météo et fatigue.','Prépare l’appel à l’aide si la protection ne permet pas de tenir.']);
