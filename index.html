<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f3d56">
  <title>Guide trek mobile — Pluie</title>
  <style>
    :root{--bg:#f4f7f8;--card:#fff;--text:#172126;--muted:#5f6f77;--blue:#0f3d56;--blue2:#dcebf2;--danger:#8f1d1d;--danger-bg:#fde8e8;--warn:#8a5a00;--warn-bg:#fff4d6;--ok:#1d5c3a;--ok-bg:#e6f4ec;--border:#d8e1e5;--shadow:0 2px 10px rgba(14,34,44,.08);--radius:16px}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.42}.wrap{max-width:760px;margin:0 auto;padding:env(safe-area-inset-top) 14px calc(28px + env(safe-area-inset-bottom))}header{padding:22px 4px 14px}h1{margin:0 0 4px;font-size:30px;line-height:1.05;letter-spacing:-.02em;color:var(--blue)}.subtitle{margin:0;color:var(--muted);font-size:15px}.memo{background:var(--blue);color:#fff;border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);margin-bottom:12px;font-weight:700;font-size:16px}.danger{background:var(--danger-bg);border:1px solid #efb4b4;border-left:6px solid var(--danger);border-radius:var(--radius);padding:14px 15px;margin-bottom:12px;box-shadow:var(--shadow)}.danger h2{margin:0 0 8px;color:var(--danger);font-size:18px}.danger p,.danger ul{margin:6px 0}.danger ul{padding-left:20px}.section-title{margin:18px 4px 8px;font-size:17px;color:var(--blue);text-transform:uppercase;letter-spacing:.04em}details{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin:9px 0;box-shadow:var(--shadow);overflow:hidden}summary{cursor:pointer;list-style:none;padding:16px 48px 16px 16px;font-weight:800;font-size:17px;position:relative;color:var(--blue);user-select:none}summary::-webkit-details-marker{display:none}summary::after{content:"+";position:absolute;right:16px;top:50%;transform:translateY(-50%);width:28px;height:28px;display:grid;place-items:center;border-radius:50%;background:var(--blue2);color:var(--blue);font-size:22px;line-height:1}details[open] summary::after{content:"–"}.content{border-top:1px solid var(--border);padding:12px 16px 16px;font-size:16px}.content ol,.content ul{margin:6px 0;padding-left:22px}.content li{margin:8px 0}.priority{background:var(--ok-bg);border-left:5px solid var(--ok);padding:10px 12px;border-radius:10px;margin:10px 0;font-weight:700}.warning{background:var(--warn-bg);border-left:5px solid var(--warn);padding:10px 12px;border-radius:10px;margin:10px 0}.never{background:var(--danger-bg);border-left:5px solid var(--danger);padding:10px 12px;border-radius:10px;margin:10px 0}.quicknav{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0 4px}.quicknav button{border:1px solid var(--border);background:var(--card);color:var(--blue);padding:12px 10px;border-radius:13px;font-weight:800;font-size:15px;box-shadow:var(--shadow)}footer{color:var(--muted);font-size:13px;text-align:center;padding:20px 8px 8px}@media(max-width:390px){h1{font-size:28px}.quicknav{grid-template-columns:1fr}}@media print{body{background:#fff}details{break-inside:avoid}details[open] summary::after{display:none}.quicknav{display:none}}
  </style>
</head>
