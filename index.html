<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#123f57">
<title>Guide trek — Avis terrain</title>
<style>
:root{--b:#123f57;--bg:#edf3f5;--card:#fff;--t:#182328;--m:#5d6d75;--line:#d5e0e4;--r:#8b1e1e;--o:#7a5300;--g:#1c5b3a;--i:#53606b;--gb:#e7f4ec}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:system-ui,-apple-system,sans-serif;line-height:1.47}main{max-width:880px;margin:auto;padding:14px 12px 42px}.hero,.card,.result,details{background:var(--card);border:1px solid var(--line);border-radius:16px}.hero,.card,.result{padding:16px}.hero h1{margin:0;color:var(--b)}.hero p{margin:8px 0}.eyebrow{font-size:.8rem;font-weight:850;color:var(--m);letter-spacing:.04em}.question{font-size:1.28rem;font-weight:850;color:var(--b);margin:5px 0}.help{color:var(--m);margin:0 0 14px}.menu,.choices,.checks,.checklist{display:grid;gap:10px}.menu{grid-template-columns:repeat(2,minmax(0,1fr))}.group{display:grid;gap:8px;margin-top:12px}.group-title{font-size:.82rem;font-weight:900;color:var(--b);text-transform:uppercase;letter-spacing:.04em}.group-note{margin:-3px 0 2px;color:var(--m);font-size:.92rem}.tile,.choice,.check,.task{border:1px solid var(--line);border-radius:13px;background:#f8fbfc}.tile,.choice{width:100%;font:inherit;text-align:left;padding:14px;color:var(--b);font-weight:800;cursor:pointer}.tile{min-height:112px}.tile .icon{font-size:1.45rem}.tile span,.choice span,.check small{display:block;font-weight:500;color:var(--m);margin-top:4px}.tile.active{background:#eef7f3;border-color:#b8d7c7}.tile.planned{background:#fbfbfc}.choice.unknown{background:#f2f0f7;color:#563d72}.check,.task{display:flex;gap:11px;align-items:flex-start;padding:12px;cursor:pointer}.check input,.task input{width:22px;height:22px;margin-top:2px;accent-color:var(--b)}.check strong{display:block}.actions{display:flex;gap:8px;margin-top:14px}.actions button{font:inherit;border:0;border-radius:12px;padding:11px 13px;font-weight:800;cursor:pointer}.primary{background:var(--b);color:#fff;flex:1}.secondary{background:#e8eef0;color:var(--m)}.result{border-left:7px solid var(--b)}.result.stop{border-color:var(--r)}.result.caution{border-color:var(--o)}.result.go{border-color:var(--g)}.result.info{border-color:var(--i)}.badge{display:inline-block;background:#e8eef0;border-radius:999px;padding:5px 9px;font-size:.78rem;font-weight:850}.result h2{color:var(--b);margin:8px 0 5px}.why{background:#f6f9fa;border-radius:12px;padding:11px;margin:10px 0}.checklist{margin-top:13px}.task.done{opacity:.56;text-decoration:line-through}.progress{height:9px;background:#e6ecef;border-radius:999px;overflow:hidden;margin:12px 0 5px}.bar{height:100%;background:var(--g);width:0;transition:.2s}.status{font-size:.87rem;color:var(--m);font-weight:750}.context{background:#eef4f7;border-left:5px solid var(--b);padding:10px 12px;border-radius:10px;margin:10px 0}.notice{background:#fff4d8;border-left:5px solid var(--o);padding:10px 12px;border-radius:10px;margin:10px 0}details{padding:0 14px;margin-top:11px}summary{padding:14px 0;font-weight:850;color:var(--b);cursor:pointer}a{color:var(--b)}@media(max-width:620px){.menu{grid-template-columns:1fr}.actions{flex-direction:column}}
.tutorials{display:grid;gap:9px;margin:12px 0}.tip{border:1px solid var(--line);border-left:5px solid var(--b);border-radius:12px;background:#fbfdfd;padding:10px 11px}.tip b{display:block;color:var(--b);margin-bottom:3px}.tip span{display:block;color:var(--m);font-size:.94rem}.tip.stop{border-left-color:var(--r)}.tip.caution{border-left-color:var(--o)}.tip.info{border-left-color:var(--i)}.tip.go{border-left-color:var(--g)}
</style>
</head>
<body>
<main>
<section class="hero"><h1>🧭 Guide trek</h1><p>Un avis terrain pour les situations difficiles en randonnée et en bivouac.</p><p>Réponds avec les faits observables. Le conseil proposé peut rester imparfait : l’objectif est de choisir la conduite la plus adaptée au réel.</p></section>
<section id="app" class="card"></section>
</main>
<script>
'use strict';
const app=document.getElementById('app');
const state={section:null,context:null,answers:[]};
const sections=[
 ['weather','🌧️','Pluie, vent ou orage','Recevoir un avis adapté à la situation météo.','active'],
 ['injury','🩹','Blessure','Douleur, chute, plaie, entorse ou impossibilité d’appui.','active'],
 ['health','🫀','Malaise ou état inhabituel','Fatigue extrême, froid, chaleur, nausée, vertige ou comportement anormal.','active'],
 ['lost','🗺️','Perdu ou position incertaine','Trace perdue, doute sur l’itinéraire ou impossibilité de se situer.','active'],
 ['gear','🎒','Matériel endommagé ou perdu','Tente, chaussures, veste, navigation, éclairage ou téléphone.','active'],
 ['food','🥜','Nourriture','Manque de nourriture, perte, rationnement, appétit ou stockage.','active'],
 ['rescue','🆘','Appeler les secours','Savoir quand appeler et quelles informations préparer.','active'],
 ['bivouac','⛺','Bivouac','Choisir un emplacement, monter, sécuriser ou démonter le camp.','active'],
 ['water','💧','Eau','Manque d’eau, source douteuse ou traversée de torrent.','active']
];
const contexts=[
 ['continue','En cours d’étape','Le groupe est encore en déplacement sur l’itinéraire prévu.'],
 ['return','Sur le trajet de retour','Le groupe revient vers un point déjà connu ou envisage ce trajet.'],
 ['escape','Vers une sortie possible','Une route, vallée, refuge, village ou autre sortie peut être envisagé.'],
 ['near','Proche du bivouac prévu','Le site prévu est proche, mais il reste un dernier tronçon.'],
 ['arrived','Sur zone, tente non montée','Le groupe est arrivé sur une zone de bivouac possible.'],
 ['camp','Bivouac installé','La tente ou l’abri est déjà en place.'],
 ['packing','Démontage en cours','Le camp est en train d’être rangé ou va l’être.'],
 ['unknown','Situation difficile à qualifier','La phase ou la meilleure option n’est pas claire.']
];
const questions={
 weather:[['thunder','Tonnerre entendu ou éclair visible'],['flood','Eau qui monte, torrent brun ou ruissellement concentré'],['hypo','Confusion, somnolence, maladresse forte ou frissons incontrôlables'],['visibility','Brouillard, nuit blanche ou visibilité trop faible pour lire le terrain'],['wetCold','Trempé et froid mais encore lucide'],['better','État amélioré durablement après protection'],['rain','Pluie continue ou qui s’intensifie'],['wind','Rafales fortes'],['cold','Quelqu’un est trempé, frissonne ou se refroidit'],['exposed','Crête, col, plateau ouvert ou passage où une chute serait grave'],['committed','Déjà engagé dans un passage où revenir ou s’arrêter est difficile'],['stablePoint','Point stable accessible sans aggraver le risque'],['terrain','Terrain simple, position certaine et progression encore maîtrisée'],['margin','Marge horaire suffisante avant nuit ou aggravation'],['shortOption','Point sûr, abri, retour ou sortie à moins d’une heure'],['longOption','Option la plus proche à plus d’une heure'],['dry','Duvet, couche sèche, téléphone et batterie protégés'],['returnKnown','Retour connu jusqu’au dernier point sûr'],['returnSafer','Le retour évite les passages les plus exposés'],['escapeKnown','Échappatoire confirmée en temps, distance et terrain'],['escapeSafe','Échappatoire accessible sans col, torrent ou passage engagé'],['shelter','Bâtiment fermé ou véhicule accessible sans passage dangereux'],['shelterShared','Abri d’un autre groupe ou abri de fortune possible'],['shelterLost','Tente perdue, inutilisable ou couchage mouillé'],['siteOk','Site de bivouac hors ravine, berge, cuvette, crête, arbre menaçant et chute de pierres'],['siteDrain','Sol drainant avec une issue de repli possible'],['campThreat','Le camp est menacé par eau, pierres, arbre, pente ou ancrages qui cèdent'],['tentStable','Tente ancrée, couchage sec et matériel critique accessible'],['packingReady','Sac, navigation, vêtements et destination prêts avant démontage']],
 injury:[['grave','Inconscience, respiration anormale, saignement important ou traumatisme crânien','Signe grave observé maintenant.'],['spine','Chute avec douleur au dos, au cou, engourdissement ou faiblesse','Risque de lésion qui rend les déplacements dangereux.'],['walk','La personne ne peut pas marcher de façon stable','Appui impossible, chute répétée ou marche très déséquilibrée.'],['blister','Ampoule, frottement ou douleur de pied qui modifie la marche','Gêne encore limitée mais qui peut empirer vite.'],['worse','La douleur ou l’état s’aggrave','Évolution nette malgré l’arrêt ou les premiers gestes.'],['exposed','Le terrain impose encore un passage exposé','Section où une chute aurait de fortes conséquences.'],['cold','La personne est mouillée ou se refroidit','Vêtements humides, frissons ou perte d’énergie.'],['help','Un refuge, une route ou une aide est proche','Accès identifié sans passage plus dangereux.'],['shortOption','Sortie ou point stable à moins d’une heure','Option réellement praticable.']],
 health:[['grave','Confusion, douleur thoracique, difficulté respiratoire, convulsion ou faiblesse d’un côté','Signe grave observé maintenant.'],['allergy','Gonflement du visage, gêne respiratoire ou réaction allergique rapide','Signe possible d’anaphylaxie.'],['vomit','Vomissements répétés ou impossibilité de boire','Hydratation ou récupération compromise.'],['heatStroke','Peau très chaude, confusion ou arrêt de la transpiration','Signe possible de coup de chaleur.'],['cold','Froid, vêtements mouillés ou frissons','Risque de refroidissement.'],['heat','Chaleur forte, vertiges, mal de tête ou crampes','Risque lié à la chaleur ou aux sels.'],['panic','Panique, anxiété forte ou jugement inhabituel','La personne ou le groupe ne décide plus normalement.'],['altitude','Mal de tête, nausée ou fatigue inhabituelle en altitude','Signe compatible avec le mal aigu des montagnes.'],['better','L’état s’améliore nettement après arrêt, protection, boisson ou nourriture','Amélioration claire et durable, pas seulement quelques secondes.'],['exposed','Le terrain devant est engagé ou exposé','Suite difficile à interrompre rapidement.']],
 lost:[['safe','Je suis arrêté sur un point sûr','Hors crête, ravine, torrent et passage technique.'],['last','Je connais le dernier point où ma position était certaine','Lieu identifiable sur carte, trace ou terrain.'],['return','Je peux revenir vers ce point par un trajet connu','Sans couper hors sentier ni improviser.'],['gps','Carte, GPS et relief se recoupent','Au moins deux indices concordent.'],['conflict','Carte, GPS, balisage ou relief ne se recoupent pas','Les indices donnent des directions ou altitudes contradictoires.'],['offtrail','Le groupe est hors sentier sans l’avoir choisi','Plus de trace fiable ou retour visuel incertain.'],['blockedTrail','Sentier barré, effondré, noyé, fermé ou impraticable','Obstacle réel sur l’itinéraire prévu.'],['trail','Sentier ou balisage retrouvé devant moi','Continuité visible sans traverser un danger.'],['dark','La nuit approche ou la batterie est faible','Marge de navigation en baisse.'],['exposed','Le terrain autour est raide, boisé, barré ou traversé par des torrents','Erreur de direction difficile à corriger.'],['separated','Le groupe est séparé ou quelqu’un manque','La navigation devient aussi une recherche de personne.']],
 gear:[['critical','La panne touche l’abri, le couchage, les chaussures, la navigation, l’éclairage ou la communication','Fonction importante pour marcher ou passer la nuit.'],['shelterLost','Tente, tarp ou couchage perdu, trempé ou inutilisable','Protection de nuit compromise.'],['boot','Chaussure ou semelle défaillante','Appui, protection ou adhérence compromis.'],['nav','Carte, téléphone, GPS ou batterie inutilisable','Capacité de navigation réduite.'],['light','Frontale, lampe ou éclairage inutilisable','La marge chute vite si la nuit approche.'],['backup','Une solution de secours ou une redondance existe','Partage, réparation, autre appareil ou autre protection.'],['repair','La réparation est simple et possible sur un point sûr','Sans rester dans un passage exposé.'],['dark','La nuit ou le mauvais temps approche','La marge diminue.'],['exposed','La suite comporte un passage engagé','Terrain où une panne aggrave fortement le risque.'],['exit','Une sortie sûre est proche','Accès identifié et praticable.']],
 food:[['low','Nourriture insuffisante pour la durée restante','Déficit probable au-delà d’un simple repas.'],['far','Sortie, refuge ou ravitaillement à plusieurs heures ou jours','La durée restante dépasse la marge alimentaire.'],['lostFood','Nourriture perdue, mouillée, écrasée ou volée par un animal','Une partie de la réserve n’est plus disponible.'],['noCook','Les repas restants demandent cuisson, eau ou combustible indisponible','Réserve théorique mais pas immédiatement mangeable.'],['snacks','Aliments simples mangeables maintenant disponibles','Barres, fruits secs, noix, biscuits, fromage, salé ou sucré.'],['noAppetite','Pas faim, nausée ou difficulté à manger assez','La nourriture existe mais n’entre pas vraiment.'],['weak','Froid, faiblesse, tremblements, moral bas ou jugement qui baisse','Le manque d’énergie affecte déjà le groupe.'],['share','Partage des réserves possible dans le groupe','Les quantités sont inégales mais mutualisables.'],['exit','Sortie, refuge, route, aide ou ravitaillement proche et confirmé','Option concrète avant rupture énergétique.'],['unsafe','Nourriture avariée, souillée, ouverte ou suspecte','Risque digestif ou sanitaire.'],['animalRisk','Odeurs, déchets ou nourriture ouverte près du couchage','Risque animal ou camp non stabilisé.']],
 rescue:[['life','Inconscience, respiration anormale, traumatisme grave ou saignement important','Signe grave observé maintenant.'],['blocked','Le groupe est bloqué sans option de déplacement sûre','Aucune sortie autonome claire.'],['walk','Une personne ne peut plus marcher en sécurité','Déplacement autonome compromis.'],['worse','L’état se dégrade malgré les premières mesures','Évolution défavorable.'],['missing','Une personne est séparée ou introuvable','Le groupe ne peut plus confirmer sa sécurité.'],['noSignal','Pas de réseau téléphonique exploitable','L’appel direct est impossible maintenant.'],['messenger','Balise, InReach, radio ou autre moyen d’alerte disponible','Communication possible sans réseau mobile.'],['position','La position est connue avec coordonnées ou repères','Information utile à transmettre.'],['battery','Le téléphone a assez de batterie ou une autre communication existe','Moyen de rester joignable.'],['shelter','Protection possible pour attendre','Abri, vêtements, isolation, eau ou visibilité.']],
 bivouac:[['hazard','Site dans une ravine, berge, cuvette, crête, pied de pente, arbre menaçant ou chute de pierres','Le lieu expose à un danger supérieur.'],['drain','Sol drainant avec issue de repli','L’eau s’évacue et le groupe peut bouger.'],['wind','Vent fort ou ancrages difficiles','La tenue de l’abri est incertaine.'],['cold','Quelqu’un est froid, mouillé ou épuisé','Le bivouac doit d’abord protéger les personnes.'],['shelter','Tente, tarp ou abri utilisable maintenant','Protection réelle disponible.'],['shared','Abri partagé ou protection de fortune possible','Solution imparfaite mais praticable.'],['animalSigns','Traces, odeurs, restes, nourriture ouverte ou activité animale proche','Le site peut attirer ou retenir un animal.'],['foodSecure','Nourriture, déchets et objets odorants peuvent être isolés du couchage','Stockage possible selon le terrain et les règles locales.'],['water','Eau, frontale, chaussures et téléphone accessibles','Matériel critique prêt si le camp doit bouger.'],['threat','Camp déjà menacé ou ancrages qui cèdent','Rester peut devenir plus dangereux que déplacer.']],
 water:[['none','Il reste moins d’une heure d’eau pour le groupe','Réserve faible selon chaleur, effort et distance.'],['noSource','Aucun point d’eau confirmé avant plusieurs heures','Source absente, sèche, trop loin ou seulement supposée.'],['lastWater','Dernier point d’eau connu atteignable par un retour praticable','Retour réel, sans passage plus dangereux.'],['dryStretch','Section sèche longue devant le groupe','Distance ou durée qui impose de recalculer la réserve avant d’avancer.'],['heat','Chaleur forte, gorge sèche, crampes, vertiges ou fatigue inhabituelle','Risque de déshydratation ou coup de chaleur.'],['overdrink','Beaucoup d’eau bue avec peu de sel ou nourriture, maux de tête ou nausée','Risque possible de déséquilibre en sels.'],['source','Source, neige ou eau visible à proximité','Ressource potentielle à vérifier.'],['badWater','Eau stagnante, algues, odeur, carcasse ou contamination visible','Risque sanitaire supérieur à une source claire.'],['treat','Filtre, pastilles, ébullition ou autre traitement disponible','Réduction du risque sanitaire.'],['crossing','Torrent, rivière rapide, eau trouble ou niveau qui monte à franchir','Passage aquatique dangereux.'],['bridge','Pont, détour ou attente possible hors d’eau','Alternative au franchissement.'],['exit','Sortie, refuge ou aide proche et confirmée','Option qui réduit l’exposition.']]
};
function title(step,q,h){return `<div class="eyebrow">${step}</div><div class="question">${q}</div><p class="help">${h}</p>`}
function renderMenu(){state.section=null;state.context=null;state.answers=[];app.className='card';app.innerHTML=title('MENU PRINCIPAL','Que veux-tu gérer maintenant ?','Choisis le problème principal. Tu pourras revenir au menu à tout moment.')+`<div class="menu">${sections.map(s=>`<button class="tile ${s[4]}" data-section="${s[0]}"><div class="icon">${s[1]}</div>${s[2]}<span>${s[3]}</span></button>`).join('')}</div>`;app.querySelectorAll('[data-section]').forEach(b=>b.addEventListener('click',()=>{state.section=b.dataset.section;renderContext()}));}
function renderContext(){app.className='card';app.innerHTML=title('ÉTAPE 1 — CONTEXTE','Quelle est la situation actuelle ?','Choisis ce qui décrit le mieux le moment présent, sans décider encore quoi faire.')+`<div class="choices">${contexts.map(c=>`<button class="choice ${c[0]==='unknown'?'unknown':''}" data-context="${c[0]}">${c[1]}<span>${c[2]}</span></button>`).join('')}</div><div class="actions"><button class="secondary" id="menu">← Menu</button></div>`;app.querySelectorAll('[data-context]').forEach(b=>b.addEventListener('click',()=>{state.context=b.dataset.context;state.answers=[];renderQuestions()}));document.getElementById('menu').addEventListener('click',renderMenu);}
function renderQuestions(){if(state.section==='weather')return renderWeatherQuestions();const groups=questionGroups();if(groups)return renderGroupedQuestions(groups);const qs=questions[state.section];if(!qs){renderOutline();return}app.className='card';app.innerHTML=title('ÉTAPE 2 — FAITS','Que constates-tu ?','Coche seulement ce que tu observes ou sais confirmer.')+`<div class="context"><b>Contexte :</b> ${contexts.find(c=>c[0]===state.context)[1]}</div><div class="checks">${qs.map(q=>`<label class="check"><input type="checkbox" value="${q[0]}"><span><strong>${q[1]}</strong><small>${q[2]}</small></span></label>`).join('')}</div><div class="actions"><button class="secondary" id="back">← Retour</button><button class="primary" id="go">Voir l’avis →</button></div>`;app.querySelectorAll('input[type=checkbox]').forEach(i=>i.addEventListener('change',()=>{state.answers=[...app.querySelectorAll('input:checked')].map(x=>x.value)}));document.getElementById('back').addEventListener('click',renderContext);document.getElementById('go').addEventListener('click',decide);}
function renderGroupedQuestions(groups){app.className='card';app.innerHTML=title('ÉTAPE 2 — FAITS','Que constates-tu ?','Coche seulement ce que tu observes ou sais confirmer.')+`<div class="context"><b>Contexte :</b> ${contexts.find(c=>c[0]===state.context)[1]}</div>${groups.map(g=>`<div class="group"><div class="group-title">${g.t}</div>${g.n?`<p class="group-note">${g.n}</p>`:''}<div class="checks">${g.q.map(q=>`<label class="check"><input type="checkbox" value="${q[0]}"><span><strong>${q[1]}</strong><small>${q[2]}</small></span></label>`).join('')}</div></div>`).join('')}<div class="actions"><button class="secondary" id="back">← Retour</button><button class="primary" id="go">Voir l’avis →</button></div>`;app.querySelectorAll('input[type=checkbox]').forEach(i=>i.addEventListener('change',()=>{state.answers=[...app.querySelectorAll('input:checked')].map(x=>x.value)}));document.getElementById('back').addEventListener('click',renderContext);document.getElementById('go').addEventListener('click',decide);}
function q(section,ids){return ids.map(id=>questions[section].find(x=>x[0]===id)).filter(Boolean)}
function questionGroups(){const c=state.context,s=state.section;if(s==='injury'){const danger={t:'Signes graves',q:q(s,['grave','spine'])};const move={t:'Déplacement',q:q(s,['walk','blister','worse','exposed'])};const env={t:'Protection et aide',q:q(s,['cold','help','shortOption'])};return [danger,move,env]}if(s==='health'){const danger={t:'Signes graves',q:q(s,['grave','allergy','heatStroke','vomit'])};const causes={t:'Contexte humain',q:q(s,['cold','heat','panic','altitude','better'])};const terrain={t:'Suite de l’itinéraire',q:q(s,['exposed'])};return c==='camp'||c==='arrived'?[danger,causes]:[danger,causes,terrain]}if(s==='lost'){const safety={t:'Point de sécurité',q:q(s,['safe','separated'])};const position={t:'Repères',q:q(s,['last','gps','conflict','offtrail','blockedTrail','trail'])};const options={t:'Options de déplacement',q:q(s,['return','dark','exposed'])};return [safety,position,options]}if(s==='gear'){const critical={t:'Fonction touchée',q:q(s,['critical','shelterLost','boot','nav','light'])};const solution={t:'Solution possible',q:q(s,['backup','repair','exit'])};const risk={t:'Marge et terrain',q:q(s,['dark','exposed'])};return [critical,solution,risk]}if(s==='food'){const stock={t:'Réserve réelle',q:q(s,['low','far','lostFood','unsafe'])};const usable={t:'Mangeable maintenant',q:q(s,['snacks','noCook','noAppetite','weak'])};const options={t:'Options et camp',q:q(s,['share','exit','animalRisk'])};return [stock,usable,options]}if(s==='rescue'){const trigger={t:'Motif possible',q:q(s,['life','blocked','walk','worse','missing'])};const call={t:'Appel et attente',q:q(s,['noSignal','messenger','position','battery','shelter'])};return [trigger,call]}if(s==='bivouac'){const site={t:'Site',q:q(s,['hazard','drain'])};const shelter={t:'Protection',q:q(s,['shelter','shared','wind','cold','animalSigns','foodSecure'])};const camp={t:'Camp et départ',q:q(s,['water','threat'])};return c==='continue'||c==='return'||c==='escape'?[shelter,camp]:[site,shelter,camp]}if(s==='water'){const human={t:'État humain et réserve',q:q(s,['none','noSource','dryStretch','heat','overdrink'])};const resource={t:'Eau disponible',q:q(s,['source','lastWater','badWater','treat','exit'])};const crossing={t:'Franchissement',q:q(s,['crossing','bridge'])};return [human,resource,crossing]}return null}
function renderWeatherQuestions(){const groups=weatherQuestionGroups();app.className='card';app.innerHTML=title('ÉTAPE 2 — FAITS MÉTÉO','Que constates-tu maintenant ?','Coche seulement ce qui est vrai. Laisse vide ce qui est incertain.')+`<div class="context"><b>Contexte :</b> ${contexts.find(c=>c[0]===state.context)[1]}</div>${groups.map(g=>`<div class="group"><div class="group-title">${g.t}</div>${g.n?`<p class="group-note">${g.n}</p>`:''}<div class="checks">${g.q.map(q=>`<label class="check"><input type="checkbox" value="${q[0]}"><span><strong>${q[1]}</strong>${q[2]?`<small>${q[2]}</small>`:''}</span></label>`).join('')}</div></div>`).join('')}<div class="actions"><button class="secondary" id="back">← Retour</button><button class="primary" id="go">Voir l’avis →</button></div>`;app.querySelectorAll('input[type=checkbox]').forEach(i=>i.addEventListener('change',()=>{state.answers=[...app.querySelectorAll('input:checked')].map(x=>x.value)}));document.getElementById('back').addEventListener('click',renderContext);document.getElementById('go').addEventListener('click',decide);}

function injuryDecision(){if(has('grave'))return R('stop','Protège, alerte et secoure','Un signe grave prime sur l’objectif et sur le choix initial de continuer ou revenir.',['Écarte seulement le danger immédiat du lieu.','Appelle les secours.','Contrôle conscience, respiration et saignement.','Protège de la pluie, du vent et du sol froid.','Ne laisse pas la personne seule.']);if(has('spine'))return R('stop','Limite les mouvements et demande de l’aide','Après une chute avec douleur du dos, du cou, faiblesse ou engourdissement, déplacer la personne peut aggraver la situation sauf danger immédiat du lieu.',['Ne déplace pas la personne sauf crue, feu, chute de pierres ou autre menace immédiate.','Stabilise tête, cou et tronc autant que possible.','Protège du froid et de la pluie.','Prépare position, mécanisme de chute et signes observés.','Appelle les secours ou envoie chercher de l’aide si aucune communication ne passe.']);if(has('walk')||has('worse'))return R(has('help')&&has('shortOption')&&!has('exposed')?'caution':'stop',has('help')&&has('shortOption')&&!has('exposed')?'Rejoins l’aide proche avec assistance':'Ne force pas la marche','Une marche instable ou une aggravation rend incohérente la poursuite normale. Une sortie très proche peut rester adaptée si elle évite un terrain exposé.',['Immobilise ou soutiens la zone blessée.','Répartis le poids du sac et garde la personne au chaud.','N’impose pas de passage exposé.','Avance seulement jusqu’à l’aide proche si la marche reste contrôlée.','Appelle les secours si la marche se dégrade ou si aucune sortie prudente n’existe.']);if(has('blister'))return R('caution','Traite le pied avant qu’il décide de l’étape','Une ampoule paraît banale, mais elle peut modifier l’appui, ralentir le groupe et transformer la descente ou la nuit en vrai problème.',['Arrête-toi sur un point stable, pas au milieu d’un passage.','Sèche, protège et ajuste chaussette ou chaussure.','Répartis le poids si la marche change.','Raccourcis avant ter function healthDecision(){if(has('grave')||has('heatStroke')||has('allergy'))return R('stop','Arrête l’effort et demande une aide médicale','Confusion, douleur thoracique, difficulté respiratoire, réaction allergique rapide ou coup de chaleur possible dépassent la simple fatigue.',['Mets la personne sur un point sûr.','Utilise le traitement d’urgence disponible si la personne en possède un et sait l’utiliser.','Refroidis activement en cas de chaleur forte : ombre, ventilation, eau sur la peau si disponible.','Protège du froid si le contexte est froid ou humide.','Appelle les secours si le signe grave est présent ou persiste.','Ne fais pas boire ou manger si la conscience ou la déglutition est altérée.']);if(has('vomit'))return R('stop','Ne compte pas sur une reprise normale','Vomissements répétés ou impossibilité de boire peuvent rendre la marche et l’attente risquées, surtout loin d’une sortie.',['Arrête l’effort et protège la personne.','Surveille conscience, température et évolution.','Évite une sortie longue ou exposée.','Choisis aide proche, descente simple ou appel selon terrain et aggravation.','Prépare une évacuation si l’état ne s’améliore pas vite.']);if(has('panic')&&!has('better'))return R('caution','Réduis la pression avant toute décision engagée','Panique, anxiété forte ou jugement inhabituel peuvent pousser à continuer trop vite, descendre au mauvais endroit ou appeler sans préparer l’attente.',['Arrête le groupe sur un point stable.','Réduis froid, faim, soif, bruit et exposition.','Donne une tâche simple à chacun : s’habiller, boire, regarder la carte, préparer lampe.','Décide seulement entre options courtes et vérifiables.','Appelle de l’aide si la personne reste incohérente ou incontrôlable.']);if(has('altitude')&&!has('better'))return R('caution','Descends ou stabilise sans monter plus haut','En altitude, une aggravation pendant la montée ne se traite pas en forçant l’objectif. La descente peut être la meilleure option si elle est praticable.',[' function lostDecision(){if(has('separated'))return R('stop','Stabilise le groupe avant de naviguer','Une personne manquante transforme le problème de navigation en problème de sécurité du groupe. Se disperser sans plan aggrave la recherche.',['Arrête le groupe sur un point sûr.','Reviens au dernier endroit où tout le monde était ensemble si le trajet est connu et sûr.','Utilise sifflet, voix, lampe ou message sans déplacer tout le groupe.','Fixe une personne qui reste au point stable si quelqu’un part chercher du réseau ou de l’aide.','Appelle ou prépare l’appel si la personne reste introuvable.']);if(!has('safe'))return R('stop','Arrête-toi d’abord sur un point sûr','La navigation ne doit pas être résolue en continuant au hasard ou en descendant vers ce qui semble plus simple.',['Quitte seulement le danger immédiat.','Ne descends pas hors sentier.','Stabilise le groupe et protège-toi de la météo.','Sors carte, téléphone ou repères sans marcher.']);if(has('blockedTrail'))return R(has('return')&&!has('exposed')?'caution':'info',has('return')&&!has('exposed')?'Contourne par le retour connu, pas par l’improvisation':'Ne force pas le sentier barré','Un sentier barré, noyé ou fermé n’autorise pas automatiquement un contournement hors trace. La bonne option est celle dont le terrain est confirmé.',['Observe l’obstacle sans t’y engager.','Refuse raccourci raide, berge instable, neige dure ou traversée d’eau.','Reviens au dernier point sûr si le retour est connu.','Cherche seulement un détour balisé ou confirmé.','Appelle ou attends si le groupe est bloqué sans option sûre.']);if(has('conflict')||has('offtrail'))return R('info','Ne choisis pas une direction tant que les indices se contredisent','Quand GPS, carte, relief ou balisage ne collent pas, le risque est de rendre l’erreur irréversible en avançant.',['Arrête-toi sur point stable.','Compare altitude, relief, sens des pentes, cours d’eau et dernier point certain.','Ne suis pas aveuglément la trace GPS.','Reviens au dernier point certain si le trajet est connu.','Appelle ou prépare l’aide si la nuit, le terrain ou la batterie réduisent la marge.']);if(has('return')&&has('last')&&!has('exposed'))return R('caution','Reviens au dernier point certain','Le retour connu est plus cohérent qu’une progression supposée, tant qu’il ne crée pas un danger supérieur maintenant.',['Confirme le cap et le terrain du retour.','Garde le groupe ensemble.','Marque mentalement ou sur la carte chaque point confirmé.','Arrête si le retour devient raide, barré ou incertain.','Réévalue au dernier point certain.']);if(has('gps')&&has('trail')&&!has('dark')&&!has('exposed'))return R('caution','Repars seulement sur un trajet recoupé','Deux indices concordants peuvent permettre de reprendre, mais pas vers une direction choisie sur une seule trace ou intuition.',['Compare carte, GPS, relief, altitude et sens des pentes.','Identifie le prochain point vérifiable.','Reste sur sentier visible.','Fixe une réévaluation courte.','Fais demi-tour au premier doute non résolu.']);if(has('dark')||has('exposed'))return R('stop','N’ajoute pas une errance dans un terrain risqué','La nuit, la batterie faible ou le terrain engagé rendent les essais successifs dangereux.',['Reste sur un site sûr.','Prépare un abri ou une protection thermique.','Économise la batterie et note les coordonnées.','Rends-toi visible ou audible.','Appelle de l’aide si aucune sortie sûre ne peut être confirmée.']);return R('info','Recoupe les informations avant de repartir','Aucune direction ne doit être choisie sur une seule indication.',['Compare carte, GPS, altitude, relief et sens des pentes.','Identifie le dernier point certain.','Cherche un trajet confirmé et réversible.','Ne coupe pas hors sentier vers une trace supposée.']);}
function gearDecision(){if(has('shelterLost')&&!has('backup')&&(has('dark')||state.context==='camp'||state.context==='arrived'))return R('stop','Remplace la protection avant de décider la suite','Perdre l’abri ou le couchage ne conclut pas automatiquement au demi-tour. La priorité est de créer une protection réelle avant une marche longue ou une nuit exposée.',['Regroupe couches sèches, téléphone, batterie et couchage encore utilisable.','Cherche partage d’abri, cabane, auvent, tarp, sursac ou protection de fortune.','Compare seulement ensuite retour, échappatoire et attente.','Évite une sortie longue si froid, nuit ou mauvais temps arrivent.','Appelle de l’aide si aucune protection praticable n’existe.']);if(has('nav')&&!has('backup'))return R('stop','Ne transforme pas la panne de navigation en errance','Sans carte, GPS ou batterie fiable, continuer peut devenir plus dangereux que s’arrêter, surtout si le terrain se complique.',['Arrête-toi sur un point stable.','Identifie dernier point certain et repères visibles.','Économise la batterie restante.','Rejoins seulement un trajet connu ou une sortie confirmée.','Appelle ou envoie chercher de l’aide si aucune direction sûre n’est prouvée.']);if(has('light')&&(has('dark')||has('exposed'))&&!has('backup'))return R('stop','Ne continue pas sans éclairage fiable','Une lampe perdue ou inutilisable devient critique avant la nuit, sous mauvais temps ou en terrain engagé. La bonne décision consiste à retrouver une marge de lumière, pas à espérer finir juste à temps.',['Arrête-toi sur un point stable avant la pénombre.','Protège téléphone et batterie sans les transformer en éclairage principal.','Cherche partage de lampe, réparation, pile ou sortie très courte et confirmée.','Évite descente raide, torrent, pierrier et hors sentier.','Prépare aide ou bivouac sûr si la sortie ne tient pas dans la lumière restante.']);if(has('boot')&&(has('exposed')||!has('repair')))return R('stop','Protège l’appui avant tout passage engagé','Une function foodDecision(){if(has('weak')&&!has('snacks'))return R('stop','Restaure de l’énergie avant toute option longue','Froid, faiblesse ou jugement qui baisse indiquent que le problème alimentaire agit déjà sur la sécurité. Continuer normalement ou rationner abstraitement n’est pas une bonne réponse.',['Arrête le groupe sur un point stable et protège du froid ou du soleil.','Cherche tout aliment simple mangeable maintenant dans tous les sacs.','Partage d’abord vers la personne la plus faible.','Choisis sortie, refuge ou aide proche si l’énergie ne revient pas vite.','Appelle de l’aide si confusion, incapacité de marche ou absence d’option autonome apparaissent.']);if(has('animalRisk')||has('lostFood')&&state.context==='camp')return R('stop','Sécurise les odeurs avant de penser rationnement','Une nourriture volée, ouverte ou dispersée près du camp change aussi le risque animal. La priorité est de stabiliser le site et ce qui reste, pas de poursuivre l’animal ni dormir au milieu des odeurs.',['Ne poursuis pas l’animal et ne récupère rien dans une zone dangereuse.','Regroupe nourriture, déchets, popote et objets odorants restants.','Éloigne-les du couchage selon le terrain et les règles locales.','Compte seulement ce qui est intact et mangeable.','Change de site ou prépare sortie si les odeurs ne sont plus maîtrisées.']);if(has('unsafe')&&!has('snacks'))return R('caution','Ne compte pas cette nourriture comme une réserve fiable','Une nourriture souillée, avariée ou suspecte peut aggraver la situation. Elle ne devient envisageable que comme option dégradée si le risque immédiat de faiblesse ou de froid est supérieur.',['Cherche d’abord aliments intacts, partage ou aide proche.','Écarte ce qui sent mauvais, est souillé ou a été ouvert par un animal.','Ne donne pas d’aliment suspect à une personne déjà nauséeuse ou affaiblie.','Raccourcis vers sortie ou ravitaillement confirmé.','Surveille vomissements, diarrhée, fièvre ou aggravation.']);if(has('noCook')&&!has('snacks'))return R('caution','Sépare la nourriture réelle de la nourriture théorique','Des repas qui demandent cuisson, eau ou combustible ne sont pas immédiatement utiles si ces moyens manquent. Il faut recalculer avec ce qui peut vraiment être mangé maintenant.',['Compte les aliments mangeables sans cuisson ni eau.','Partage les aliments simples avant la personne la plus faible.','Évite d’attendre un repas chaud si froid, nuit ou fatigue montent.','Cherche sortie, refuge, combustible, eau ou aide proche.','Ne lance pas une longue section avec seulement des repas impossibles à préparer.']);if(has('low')&&has('far')&&!has('exit'))return R('caution','Réduis l’objectif avant que la faim décide','Un déficit sur plusieurs heures ou jours use la lucidité avant de bloquer totalement la marche. Rationner n’est cohérent que si le trajet, le froid et la personne la plus faible restent maîtrisés.',['Compte repas, snacks et aliments sans cuisson pour tout le groupe.','Fixe qui mange quoi au prochain arrêt, pas seulement ce soir.','Réduis allure, dénivelé et passage technique.','Cherche retour, échappatoire, autre groupe, cabane ou aide.','Prépare l’alerte si faiblesse, froid ou confusion apparaissent.']);if(has('low')&&has('exit'))return R('caution','Rejoins l’option confirmée avant le déficit','La nourriture est limite, mais une sortie ou un ravitaillement proche peut être le choix le plus réaliste si le terrain ne rajoute pas un risque supérieur.',['Mange une petite prise avant de repartir si possible.','Confirme distance, dénivelé, lumière et terrain jusqu’à la sortie.','Garde une réserve pour la personne la plus faible.','Avance lentement et stoppe si faiblesse ou erreur de jugement apparaissent.','Ne transforme pas la sortie en course.']);if(has('noAppetite')&&has('snacks'))return R('caution','Fais entrer de l’énergie par petites prises','Avoir de la nourriture ne suffit pas si la personne ne mange presque rien. Les petites prises régulières sont souvent plus réalistes qu’un gro function rescueDecision(){if((has('life')||has('missing')||has('blocked')||has('worse'))&&has('messenger'))return R('stop','Active le moyen d’alerte maintenant','Les éléments cochés dépassent l’autonomie normale du groupe et un moyen d’alerte existe même sans réseau mobile.',['Écarte le danger immédiat sans déplacement inutile.','Envoie position, nombre de personnes, état, météo et terrain.','Garde la balise ou radio accessible et protégée.','Prépare abri, eau, lumière et visibilité pour l’attente.','Ne déplace le groupe que si rester crée un danger supérieur.']);if(has('life')||has('missing')||has('blocked')||has('worse'))return R('stop','Appelle les secours maintenant','Les éléments cochés dépassent l’autonomie normale d’un trek ou peuvent empirer pendant une évacuation improvisée.',['Écarte le danger immédiat sans déplacement inutile.','Prépare position, nombre de personnes, état, météo et terrain.','Appelle le numéro d’urgence local ou active la balise si c’est le seul moyen.','Suis les consignes reçues.','Économise la batterie et reste joignable.','Protège le groupe pour l’attente.']);if(has('walk'))return R('stop','Demande de l’aide si la marche sûre n’existe plus','L’appel n’est pas une sanction : si une personne ne peut plus se déplacer en sécurité, l’évacuation autonome peut créer un accident secondaire.',['Stabilise la personne hors danger immédiat.','Protège du froid, de la pluie, du soleil et du sol.','Compare seulement une aide très proche et sans passage exposé.','Prépare coordonnées, signes et évolution.','Appelle si le déplacement reste incertain.']);if(has('noSignal')&&!has('messenger'))return R('info','Prépare l’alerte sans disperser le groupe','Sans réseau ni balise, chercher du signal peut être utile mais ne doit pas créer une deuxième urgence.',['Note position, itinéraire, état et heure avant tout déplacement.','Protège le groupe pour attendre.','Cherche un point de réseau seulement si le trajet est court et sûr.','Si quelqu’un part chercher du réseau, fixe horaire, destination et retour.','Garde au moins une personne avec le blessé ou le groupe vulnérable.']);if(!has('position'))return R('info','Fixe ta position avant l’appel si possible','Un appel peut être nécessaire, mais une position claire améliore fortement l’aide. Ne retarde pas si un signe grave existe.',['Note coordonnées GPS, altitude, itinéraire et dernier point connu.','Décris terrain, météo, visibilité et accès possible.','Garde téléphone et batterie au chaud et au sec.','Rends le groupe visible ou audible.']);return R('caution','Prépare les informations avant de décider','Même sans signe grave coché, une préparation structurée évite de perdre du temps si la situation évolue.',['Confirme les coordonnées et le dernier point connu.','Note état, évolution, météo et autonomie.','Identifie une sortie sûre possible.','Garde protection, eau et lumière pour l’attente.','Appelle si la marche devient dangereuse ou si l’état se dégrade.']);}
function bivouacDecision(){if(has('hazard'))return R('stop','Ne transforme pas ce lieu en camp','Un bivouac ne réduit le risque que si le site lui-même ne t’installe pas dans l’axe de l’eau, des pierres, du vent ou d’un arbre menaçant.',['Quitte ravine, berge, cuvette, crête, pied de pente et arbre menaçant.','Garde duvet, couches sèches et téléphone protégés pendant la recherche.','Cherche un sol drainant, légèrement bombé, avec sortie de repli.','Monte seulement quand le lieu réduit le risque.']);if(has('animalSigns')&&!has('foodSecure'))return R('stop','Ne dors pas avec les odeurs et la nourriture','Un site avec traces, restes, odeurs ou activité animale impose de traiter nourriture, déchets et objets odorants avant le couchage. Sans stockage crédible, le camp n’est pas acceptable.',['Garde nourriture et déchets sous contrôle immédiat.','Éloigne le couchage des odeurs et restes si le terrain le permet.','Cherche un autre site ou un stockage conforme aux règles locales.','Ne cuisine pas dans l’espace de sommeil.','Prépare déplacement ou aide si aucune solution propre n’existe avant la nuit.']);if(has('animalSigns')&&has('foodSecure'))return R('caution','Sécurise les odeurs avant d’installer le couchage','La présence animale ne condamne pas toujours le bivouac, mais elle change l’ordre des priorités : nourriture, déchets et objets odorants passent avant le confort.',['Isole nourriture, déchets, popote et produits odorants du couchage.','Nettoie ou ferme ce qui peut attirer.','Installe le couchage seulement après stockage réel.','Garde lampe, chaussures et sortie prêtes.','Change de site si l’activité animale se rapproche.']);if(state.context==='packing'&&!has('water'))return R('stop','Ne démonte pas avant d’être prêt à partir','Perdre l’abri avant d’avoir chaussures, veste, eau, lampe, navigation et téléphone accessibles enlève la marge au mauvais moment.',['Habille-toi pour marcher.','Range le couchage et les couches sèches au sec.','Prépare destination, navigation et lampe.','Conserve la protection extérieure jusqu’au dernier moment.']);if(state.context==='camp'&&(has('threat')||has('wind')&&!has('shelter')))return R('stop','Prépare un déplacement ou un renforcement immédiat','Un camp installé peut devenir mauvais si l’eau, le vent, la pente ou les ancrages changent. Rester par inertie est rarement une bonne raison.',['Protège le couchage et les vêtements secs.','Garde chaussures, veste, lampe, téléphone et eau accessibles.','Renforce seulement si cela suffit vraiment.','Sinon déplace vers un site plus sûr dès que le passage est praticable.']);if(!has('shelter')&&!has('shared'))return R('info','Trouve une protection praticable avant la nuit','Sans tente, tarp, abri partagé ou solution de fortune, la décision n’est pas encore complète. La bonne option dépend du froid, de la distance et du terrain.',['Cherche cabane, auvent, autre groupe, relief abrité ou montage de fortune.','Compare retour, sortie et attente selon durée réelle.','Protège d’abord les personnes froides et le matériel sec.','Appelle de l’aide si aucune protection crédible n’apparaît.']);if(has('drain'))return R('caution','Installe un camp sobre et surveillé','Le site paraît praticable. L’objectif est de créer vite une protection utile, pas un camp confortable au détriment de la marge.',['Oriente l’abri contre le vent dominant.','Ancre et ferme avant de sortir le couchage.','Éloigne le sec des parois mouillées.','Garde chaussures, lampe, veste, téléphone et eau prêts.','Réévalue drainage, ancrages et état du groupe après 10 minutes.']);return R('info','Vérifie le site avant de monter','Le bivouac n’est cohérent que si le lieu réduit le risque. Il manque encore une preuve de drainage ou de repli.',['Observe écoulement, pente, arbres, pierres et vent.','Cherche un sol drainant avec issue de repli.','Garde le sac fermé pendant l’observation.','Monte seulement quand les dangers évidents sont écartés.']);}
function waterDecision(){if(has('crossing')&&has('bridge'))return R('caution','Prends l’alternative hors d’eau','Un pont, un détour ou une attente praticable vaut mieux qu’un franchissement douteux. Le temps perdu est souvent moins dangereux qu’une chute en eau froide ou rapide.',['Confirme que l’alternative ne rajoute pas un passage plus exposé.','Reste hors berge instable et hors courant.','Garde le groupe ensemble.','Réévalue eau disponible, lumière et fatigue après le détour.']);if(has('crossing')&&!has('bridge'))return R('stop','Ne force pas le franchissement','Un torrent trouble, rapide ou en hausse est un piège classique : la traversée peut devenir plus dangereuse que le retard, le détour ou l’appel.',['Cherche pont, gué plus large et calme, détour ou attente hors d’eau.','Détache les sangles du sac si une traversée devient réellement inévitable.','Ne traverse pas seul ni avec une personne faible.','Renonce si l’eau monte, pousse fort ou masque les appuis.','Appelle de l’aide si le groupe est bloqué sans option sûre.']);if(has('badWater')&&has('source')&&(has('none')||has('heat'))&&!has('treat'))return R('caution','Choisis le risque le moins dangereux avec cette eau','Une eau visiblement douteuse n’est pas une source normale. Elle peut toutefois devenir le moindre risque si la chaleur, la rupture d’eau ou l’épuisement menacent maintenant.',['Cherche d’abord une eau plus claire, en amont et loin des traces évidentes.','Filtre avec tissu si aucun traitement n’existe.','Bois par petites prises seulement si l’alternative immédiate est pire.','Réduis l’effort et rejoins sortie, aide ou traitement dès que possible.','Surveille vomissements, diarrhée, fièvre ou aggravation.']);if(has('heat')&&has('none'))return R('stop','Réduis l’effort avant de chercher loin','Manque d’eau et chaleur font perdre le jugement. Continuer vers une source supposée peut être pire qu’un arrêt ombragé et une sortie confirmée.',['Mets le groupe à l’ombre ou hors chaleur directe.','Réduis l’effort et répartis l’eau restante.','Cherche une source seulement si le trajet est court et sûr.','Privilégie sortie ou aide proche confirmée.','Appelle si confusion, incapacité de marche ou absence d’option apparaissent.']);if(has('badWater')&&has('source'))return R('caution','Ne traite pas cette eau comme une source fiable','Algues, odeur, carcasse ou contamination visible changent l’arbitrage. La bonne question n’est pas seulement boire ou ne pas boire, mais quelle option réduit le plus le risque global.',['Cherche une autre source ou le dernier point d’eau connu.','Utilise traitement complet si disponible.','Évite de remplir toute la réserve avec cette eau si une meilleure option existe.','Raccourcis vers sortie ou eau fiable.','Garde cette option comme dernier recours si la déshydratation devient le risque dominant.']);if(has('noSource')&&has('lastWater')&&!has('heat'))return R('caution','Reviens au point d’eau connu si le retour reste simple','Une section sèche devant ne se traite pas comme une gêne mineure. Si le dernier point d’eau est réellement atteignable sans danger supérieur, reprendre de l’eau maintenant peut être le choix le plus solide.',['Confirme le trajet retour et le temps nécessaire.','Garde assez d’eau pour revenir sans te mettre en rupture.','Évite de compter sur une cache ou une source supposée.','Une fois rechargé, recalcule la section sèche avant de repartir.']);if(has('noSource')&&!has('source')&&!has('exit'))return R('info','Ne t’engage pas dans une section sèche non confirmée','Le problème n’est pas seulement la quantité restante : c’est l’absence de prochain point fiable. Avancer sans plan d’eau transforme une marge faible en urgence.',['Arrête-toi à l’ombre si possible.','Compte l’eau disponible pour tout le groupe.','Estime la durée jusqu’au prochain point fiable, pas jusqu’à une source supposée.','Compare retour au dernier point d’eau, détour, sortie ou attente.','Renonce à la section sèche si la réserve ne couvre pas largement le trajet.']);if(has('dryStretch')&&!has('source')&&!has('exit'))return R('caution','Recalcule avant la section sèche','Une longue portion sans eau peut rester possible si elle est prévue, mais elle doit être décidée avant d’y entrer, pas subie au milieu.',['Calcule eau par personne, chaleur, dénivelé et rythme réel.','Vérifie le dernier point d’eau fiable.','Décide maintenant entre charger plus, attendre la fraîcheur, revenir ou raccourcir.','Ne dépends pas d’une cache non garantie.']);if(has('overdrink'))return R('caution','Ne réponds pas seulement par plus d’eau','Maux de tête, nausée et grande quantité d’eau sans sel peuvent évoquer un problème d’équilibre, pas seulement une déshydratation.',['Arrête l’effort et mets la personne au repos.','Évite de forcer l’eau.','Fais prendre nourriture salée si la personne est lucide et avale normalement.','Surveille confusion, vomissements et aggravation.','Demande une aide médicale si l’état ne s’améliore pas.']);if(has('source')&&!has('treat'))return R('caution','Utilise l’eau seulement après choix du risque','Boire une eau douteuse peut être acceptable si le risque immédiat de chaleur ou d’épuisement dépasse le risque digestif futur, mais ce n’est pas neutre.',['Privilégie eau claire en amont des zones fréquentées.','Filtre avec tissu si aucune autre option n’existe.','Bois par petites prises si l’alternative est l’épuisement.','Cherche une sortie ou un traitement dès que possible.']);if(has('source')&&has('treat'))return R('go','Recharge avant de poursuivre','Une source traitable redonne de la marge seulement si le groupe prend le temps de boire, traiter et recalculer l’étape.',['Traite l’eau selon le moyen disponible.','Bois et emporte assez pour la durée réelle.','Ajoute sel ou nourriture si l’effort est long et chaud.','Réévalue distance, chaleur et état du groupe avant de repartir.']);if(has('exit'))return R('caution','Rejoins l’option confirmée avant la rupture','Quand l’eau devient limite, il vaut mieux réduire l’exposition tôt que pousser jusqu’à la panne complète.',['Confirme distance, terrain et chaleur jusqu’à la sortie.','Réduis l’allure et les arrêts au soleil.','Garde le groupe ensemble.','Arrête si vertige, confusion ou incapacité apparaissent.']);return R('info','Recalcule l’eau avant de décider','La situation manque d’un élément clé : quantité restante, distance, chaleur, source ou sortie.',['Compte l’eau disponible pour tout le groupe.','Évalue durée réelle avec chaleur et fatigue.','Identifie source, traitement, retour ou sortie.','Ne poursuis pas vers un secteur sec sans marge claire.']);}
function R(c,t,w,s){return{c,t,w,s}}
function tutorialFor(r){const base={stop:['D’abord','Stoppe l’action en cours, mets le groupe hors danger immédiat et donne une consigne simple à voix haute.'],caution:['Avant de bouger','Ralentis, vérifie que l’option choisie reste possible maintenant, puis avance par petits tronçons.'],info:['Reprendre les faits','Ne choisis pas encore une direction définitive. Pose le groupe, observe et cherche un point vérifiable.'],go:['Continuer utilement','Continue seulement tant que les conditions restent identiques. Fixe tout de suite le prochain arrêt de contrôle.']}[r.c];const bySection={weather:['À observer','Tonnerre, eau qui monte, froid, visibilité, vent, état du groupe et protection du matériel sec.','Point de contrôle','Réévalue après 10 à 20 minutes, au prochain abri, ou dès que pluie, froid, eau ou visibilité changent.'],injury:['À vérifier','Conscience, respiration, saignement, douleur, appui, froid et capacité à parler clairement.','Geste pratique','Immobilise ou protège avant de déplacer. Teste la marche seulement sur terrain simple et quelques pas.'],health:['À vérifier','Conscience, respiration, température, peau, hydratation, nourriture, douleur, confusion et évolution depuis l’arrêt.','Geste pratique','Réduis les stimulations : abri, chaleur ou ombre, petites tâches simples, puis décision courte et réversible.'],lost:['À vérifier','Dernier point certain, altitude, relief, direction des pentes, cours d’eau, balisage, batterie et lumière restante.','Geste pratique','Ne marche pas pendant que tu cherches. Compare au moins deux indices avant de repartir.'],gear:['À vérifier','Fonction perdue, redondance réelle, réparation possible, lumière restante, terrain devant et sortie proche.','Geste pratique','Teste la solution de secours avant de compter dessus. Si elle faiblit, raccourcis tout de suite.'],food:['À compter','Repas, snacks, sel, aliments sans cuisson, durée jusqu’à sortie ou ravitaillement et personne la plus faible.','Geste pratique','Mange ou partage avant de perdre la lucidité. Rationner doit être calculé, pas improvisé.'],rescue:['À préparer','Position, nombre de personnes, état, évolution, météo, terrain, accès possible, batterie et protection d’attente.','Pendant l’attente','Rends le groupe visible, garde la communication au sec et économise la batterie. Ne déplace que pour fuir un danger supérieur.'],bivouac:['À observer','Eau, pente, pierres, arbres, vent, traces animales, drainage, issue de repli et distance entre couchage et odeurs.','Geste pratique','Monte seulement ce qui réduit le risque. Garde chaussures, lampe, eau, veste et téléphone accessibles.'],water:['À calculer','Eau restante par personne, chaleur, durée réelle, dernier point fiable, source confirmée, traitement et sortie possible.','Geste pratique','Réduis l’effort avant la rupture. Une eau visible mais douteuse reste une option dégradée, pas une réserve normale.']}[state.section];return [{t:base[0],d:base[1],c:r.c},{t:bySection[0],d:bySection[1],c:'info'},{t:bySection[2],d:bySection[3],c:'caution'}]}
function renderTutorials(r){return `<div class="tutorials">${tutorialFor(r).map(x=>`<div class="tip ${x.c}"><b>${x.t}</b><span>${x.d}</span></div>`).join('')}</div>`}
function showResult(r){const badge=r.c==='stop'?'ACTION PRIORITAIRE':r.c==='info'?'INFORMATION INSUFFISANTE':r.c==='caution'?'AVIS PRUDENT':'OPTION POSSIBLE';app.className=`result ${r.c}`;app.innerHTML=`<span class="badge">${badge}</span><h2>${r.t}</h2><div class="context"><b>Situation :</b> ${contexts.find(c=>c[0]===state.context)[1]}</div><div class="why">${r.w}</div>${renderTutorials(r)}<div class="checklist">${r.s.map((x,i)=>`<label class="task"><input type="checkbox" data-task><span><b>${i+1}.</b> ${x}</span></label>`).join('')}</div><div class="progress"><div class="bar" id="bar"></div></div><div class="status" id="status">0 / ${r.s.length} actions</div><div class="actions"><button class="secondary" id="back">← Modifier</button><button class="primary" id="menu">Menu principal</button></div>`;const boxes=[...app.querySelectorAll('[data-task]')];boxes.forEach(b=>b.addEventListener('change',()=>{b.closest('.task').classList.toggle('done',b.checked);const n=boxes.filter(x=>x.checked).length;document.getElementById('bar').style.width=`${n/boxes.length*100}%`;document.getElementById('status').textContent=`${n} / ${boxes.length} actions`; }));document.getElementById('back').addEventListener('click',renderQuestions);document.getElementById('menu').addEventListener('click',renderMenu);}
renderMenu();
</script>
