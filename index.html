<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#123f57">
<title>Guide trek — Avis terrain</title>
<style>
:root{--b:#123f57;--bg:#edf3f5;--card:#fff;--t:#182328;--m:#5d6d75;--line:#d5e0e4;--r:#8b1e1e;--o:#7a5300;--g:#1c5b3a;--i:#53606b;--gb:#e7f4ec}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:system-ui,-apple-system,sans-serif;line-height:1.47}main{max-width:880px;margin:auto;padding:14px 12px 42px}.hero,.card,.result,details{background:var(--card);border:1px solid var(--line);border-radius:16px}.hero,.card,.result{padding:16px}.hero h1{margin:0;color:var(--b)}.hero p{margin:8px 0}.eyebrow{font-size:.8rem;font-weight:850;color:var(--m);letter-spacing:.04em}.question{font-size:1.28rem;font-weight:850;color:var(--b);margin:5px 0}.help{color:var(--m);margin:0 0 14px}.menu,.choices,.checks,.checklist{display:grid;gap:10px}.menu{grid-template-columns:repeat(2,minmax(0,1fr))}.group{display:grid;gap:8px;margin-top:12px}.group-title{font-size:.82rem;font-weight:900;color:var(--b);text-transform:uppercase;letter-spacing:.04em}.group-note{margin:-3px 0 2px;color:var(--m);font-size:.92rem}.tile,.choice,.check,.task{border:1px solid var(--line);border-radius:13px;background:#f8fbfc}.tile,.choice{width:100%;font:inherit;text-align:left;padding:14px;color:var(--b);font-weight:800;cursor:pointer}.tile{min-height:112px}.tile .icon{font-size:1.45rem}.tile span,.choice span,.check small{display:block;font-weight:500;color:var(--m);margin-top:4px}.tile.active{background:#eef7f3;border-color:#b8d7c7}.tile.planned{background:#fbfbfc}.choice.unknown{background:#f2f0f7;color:#563d72}.check,.task{display:flex;gap:11px;align-items:flex-start;padding:12px;cursor:pointer}.check input,.task input{width:22px;height:22px;margin-top:2px;accent-color:var(--b)}.check strong{display:block}.actions{display:flex;gap:8px;margin-top:14px}.actions button{font:inherit;border:0;border-radius:12px;padding:11px 13px;font-weight:800;cursor:pointer}.primary{background:var(--b);color:#fff;flex:1}.secondary{background:#e8eef0;color:var(--m)}.result{border-left:7px solid var(--b)}.result.stop{border-color:var(--r)}.result.caution{border-color:var(--o)}.result.go{border-color:var(--g)}.result.info{border-color:var(--i)}.badge{display:inline-block;background:#e8eef0;border-radius:999px;padding:5px 9px;font-size:.78rem;font-weight:850}.result h2{color:var(--b);margin:8px 0 5px}.why{background:#f6f9fa;border-radius:12px;padding:11px;margin:10px 0}.checklist{margin-top:13px}.task.done{opacity:.56;text-decoration:line-through}.progress{height:9px;background:#e6ecef;border-radius:999px;overflow:hidden;margin:12px 0 5px}.bar{height:100%;background:var(--g);width:0;transition:.2s}.status{font-size:.87rem;color:var(--m);font-weight:750}.context{background:#eef4f7;border-left:5px solid var(--b);padding:10px 12px;border-radius:10px;margin:10px 0}.notice{background:#fff4d8;border-left:5px solid var(--o);padding:10px 12px;border-radius:10px;margin:10px 0}details{padding:0 14px;margin-top:11px}summary{padding:14px 0;font-weight:850;color:var(--b);cursor:pointer}a{color:var(--b)}@media(max-width:620px){.menu{grid-template-columns:1fr}.actions{flex-direction:column}}
</style>
</head>
<body>
<main>
<section class="hero"><h1>🧭 Guide trek</h1><p>Un avis terrain pour les situations difficiles en randonnée et en bivouac.</p><p>Réponds avec les faits observables. Le conseil proposé peut rester imparfait : l’objectif est de choisir la conduite la plus adaptée au réel.</p></section>
<section id="app" class="card"></section>
</main>
<script>
'use strict';
const app=document.getElementById('app');
const state={section:null,context:null,answers:[]};
const sections=[
 ['weather','🌧️','Pluie, vent ou orage','Recevoir un avis adapté à la situation météo.','active'],
 ['injury','🩹','Blessure','Douleur, chute, plaie, entorse ou impossibilité d’appui.','active'],
 ['health','🫀','Malaise ou état inhabituel','Fatigue extrême, froid, chaleur, nausée, vertige ou comportement anormal.','active'],
 ['lost','🗺️','Perdu ou position incertaine','Trace perdue, doute sur l’itinéraire ou impossibilité de se situer.','active'],
 ['gear','🎒','Matériel endommagé ou perdu','Tente, chaussures, veste, eau, navigation, éclairage ou téléphone.','active'],
 ['rescue','🆘','Appeler les secours','Savoir quand appeler et quelles informations préparer.','active'],
 ['bivouac','⛺','Bivouac','Choisir un emplacement, monter, sécuriser ou démonter le camp.','planned'],
 ['water','💧','Eau et ravitaillement','Manque d’eau, source douteuse ou traversée de torrent.','planned']
];
const contexts=[
 ['continue','En cours d’étape','Le groupe est encore en déplacement sur l’itinéraire prévu.'],
 ['return','Sur le trajet de retour','Le groupe revient vers un point déjà connu ou envisage ce trajet.'],
 ['escape','Vers une sortie possible','Une route, vallée, refuge, village ou autre sortie peut être envisagé.'],
 ['near','Proche du bivouac prévu','Le site prévu est proche, mais il reste un dernier tronçon.'],
 ['arrived','Sur zone, tente non montée','Le groupe est arrivé sur une zone de bivouac possible.'],
 ['camp','Bivouac installé','La tente ou l’abri est déjà en place.'],
 ['packing','Démontage en cours','Le camp est en train d’être rangé ou va l’être.'],
 ['unknown','Situation difficile à qualifier','La phase ou la meilleure option n’est pas claire.']
];
const questions={
 weather:[['thunder','Tonnerre entendu ou éclair visible'],['flood','Eau qui monte, torrent brun ou ruissellement concentré'],['hypo','Confusion, somnolence, maladresse forte ou frissons incontrôlables'],['wetCold','Trempé et froid mais encore lucide'],['better','État amélioré durablement après protection'],['rain','Pluie continue ou qui s’intensifie'],['wind','Rafales fortes'],['cold','Quelqu’un est trempé, frissonne ou se refroidit'],['exposed','Crête, col, plateau ouvert ou passage où une chute serait grave'],['committed','Déjà engagé dans un passage où revenir ou s’arrêter est difficile'],['stablePoint','Point stable accessible sans aggraver le risque'],['terrain','Terrain simple, position certaine et progression encore maîtrisée'],['margin','Marge horaire suffisante avant nuit ou aggravation'],['shortOption','Point sûr, abri, retour ou sortie à moins d’une heure'],['longOption','Option la plus proche à plus d’une heure'],['dry','Duvet, couche sèche, téléphone et batterie protégés'],['returnKnown','Retour connu jusqu’au dernier point sûr'],['returnSafer','Le retour évite les passages les plus exposés'],['escapeKnown','Échappatoire confirmée en temps, distance et terrain'],['escapeSafe','Échappatoire accessible sans col, torrent ou passage engagé'],['shelter','Bâtiment fermé ou véhicule accessible sans passage dangereux'],['shelterShared','Abri d’un autre groupe ou abri de fortune possible'],['shelterLost','Tente perdue, inutilisable ou couchage mouillé'],['siteOk','Site de bivouac hors ravine, berge, cuvette, crête, arbre menaçant et chute de pierres'],['siteDrain','Sol drainant avec une issue de repli possible'],['campThreat','Le camp est menacé par eau, pierres, arbre, pente ou ancrages qui cèdent'],['tentStable','Tente ancrée, couchage sec et matériel critique accessible'],['packingReady','Sac, navigation, vêtements et destination prêts avant démontage']],
 injury:[['grave','Inconscience, respiration anormale, saignement important ou traumatisme crânien','Signe grave observé maintenant.'],['walk','La personne ne peut pas marcher de façon stable','Appui impossible, chute répétée ou marche très déséquilibrée.'],['worse','La douleur ou l’état s’aggrave','Évolution nette malgré l’arrêt ou les premiers gestes.'],['exposed','Le terrain impose encore un passage exposé','Section où une chute aurait de fortes conséquences.'],['cold','La personne est mouillée ou se refroidit','Vêtements humides, frissons ou perte d’énergie.'],['help','Un refuge, une route ou une aide est proche','Accès identifié sans passage plus dangereux.']],
 health:[['grave','Confusion, douleur thoracique, difficulté respiratoire, convulsion ou faiblesse d’un côté','Signe grave observé maintenant.'],['vomit','Vomissements répétés ou impossibilité de boire','Hydratation ou récupération compromise.'],['cold','Froid, vêtements mouillés ou frissons','Risque de refroidissement.'],['heat','Chaleur forte, peau très chaude, vertiges ou mal de tête','Risque lié à la chaleur.'],['better','L’état s’améliore nettement après arrêt, protection, boisson ou nourriture','Amélioration claire et durable, pas seulement quelques secondes.'],['exposed','Le terrain devant est engagé ou exposé','Suite difficile à interrompre rapidement.']],
 lost:[['safe','Je suis arrêté sur un point sûr','Hors crête, ravine, torrent et passage technique.'],['last','Je connais le dernier point où ma position était certaine','Lieu identifiable sur carte, trace ou terrain.'],['return','Je peux revenir vers ce point par un trajet connu','Sans couper hors sentier ni improviser.'],['gps','Carte, GPS et relief se recoupent','Au moins deux indices concordent.'],['dark','La nuit approche ou la batterie est faible','Marge de navigation en baisse.'],['exposed','Le terrain autour est raide, boisé, barré ou traversé par des torrents','Erreur de direction difficile à corriger.']],
 gear:[['critical','La panne touche l’abri, le couchage, les chaussures, l’eau, la navigation ou l’éclairage','Fonction importante pour marcher ou passer la nuit.'],['backup','Une solution de secours ou une redondance existe','Partage, réparation, autre appareil ou autre protection.'],['repair','La réparation est simple et possible sur un point sûr','Sans rester dans un passage exposé.'],['dark','La nuit ou le mauvais temps approche','La marge diminue.'],['exposed','La suite comporte un passage engagé','Terrain où une panne aggrave fortement le risque.'],['exit','Une sortie sûre est proche','Accès identifié et praticable.']],
 rescue:[['life','Inconscience, respiration anormale, traumatisme grave ou saignement important','Signe grave observé maintenant.'],['blocked','Le groupe est bloqué sans option de déplacement sûre','Aucune sortie autonome claire.'],['walk','Une personne ne peut plus marcher en sécurité','Déplacement autonome compromis.'],['worse','L’état se dégrade malgré les premières mesures','Évolution défavorable.'],['position','La position est connue avec coordonnées ou repères','Information utile à transmettre.'],['battery','Le téléphone a assez de batterie ou une autre communication existe','Moyen de rester joignable.']]
};
function title(step,q,h){return `<div class="eyebrow">${step}</div><div class="question">${q}</div><p class="help">${h}</p>`}
function renderMenu(){state.section=null;state.context=null;state.answers=[];app.className='card';app.innerHTML=title('MENU PRINCIPAL','Que veux-tu gérer maintenant ?','Choisis le problème principal. Tu pourras revenir au menu à tout moment.')+`<div class="menu">${sections.map(s=>`<button class="tile ${s[4]}" data-section="${s[0]}"><div class="icon">${s[1]}</div>${s[2]}<span>${s[3]}</span></button>`).join('')}</div>`;app.querySelectorAll('[data-section]').forEach(b=>b.addEventListener('click',()=>{state.section=b.dataset.section;renderContext()}));}
function renderContext(){app.className='card';app.innerHTML=title('ÉTAPE 1 — CONTEXTE','Quelle est la situation actuelle ?','Choisis ce qui décrit le mieux le moment présent, sans décider encore quoi faire.')+`<div class="choices">${contexts.map(c=>`<button class="choice ${c[0]==='unknown'?'unknown':''}" data-context="${c[0]}">${c[1]}<span>${c[2]}</span></button>`).join('')}</div><div class="actions"><button class="secondary" id="menu">← Menu</button></div>`;app.querySelectorAll('[data-context]').forEach(b=>b.addEventListener('click',()=>{state.context=b.dataset.context;state.answers=[];renderQuestions()}));document.getElementById('menu').addEventListener('click',renderMenu);}
function renderQuestions(){if(state.section==='weather')return renderWeatherQuestions();const qs=questions[state.section];if(!qs){renderOutline();return}app.className='card';app.innerHTML=title('ÉTAPE 2 — FAITS','Que constates-tu ?','Coche seulement ce que tu observes ou sais confirmer.')+`<div class="context"><b>Contexte :</b> ${contexts.find(c=>c[0]===state.context)[1]}</div><div class="checks">${qs.map(q=>`<label class="check"><input type="checkbox" value="${q[0]}"><span><strong>${q[1]}</strong><small>${q[2]}</small></span></label>`).join('')}</div><div class="actions"><button class="secondary" id="back">← Retour</button><button class="primary" id="go">Voir l’avis →</button></div>`;app.querySelectorAll('input[type=checkbox]').forEach(i=>i.addEventListener('change',()=>{state.answers=[...app.querySelectorAll('input:checked')].map(x=>x.value)}));document.getElementById('back').addEventListener('click',renderContext);document.getElementById('go').addEventListener('click',decide);}
function renderWeatherQuestions(){const groups=weatherQuestionGroups();app.className='card';app.innerHTML=title('ÉTAPE 2 — FAITS MÉTÉO','Que constates-tu maintenant ?','Coche seulement ce qui est vrai. Laisse vide ce qui est incertain.')+`<div class="context"><b>Contexte :</b> ${contexts.find(c=>c[0]===state.context)[1]}</div>${groups.map(g=>`<div class="group"><div class="group-title">${g.t}</div>${g.n?`<p class="group-note">${g.n}</p>`:''}<div class="checks">${g.q.map(q=>`<label class="check"><input type="checkbox" value="${q[0]}"><span><strong>${q[1]}</strong>${q[2]?`<small>${q[2]}</small>`:''}</span></label>`).join('')}</div></div>`).join('')}<div class="actions"><button class="secondary" id="back">← Retour</button><button class="primary" id="go">Voir l’avis →</button></div>`;app.querySelectorAll('input[type=checkbox]').forEach(i=>i.addEventListener('change',()=>{state.answers=[...app.querySelectorAll('input:checked')].map(x=>x.value)}));document.getElementById('back').addEventListener('click',renderContext);document.getElementById('go').addEventListener('click',decide);}
function weatherQuestionGroups(){const c=state.context;const danger={t:'Signes présents',n:'Coche les signes observés maintenant.',q:[['thunder','Tonnerre entendu ou éclair visible','Même lointain ou intermittent.'],['flood','Eau qui monte, torrent brun ou ruissellement concentré','Autour du sentier, du camp ou d’un passage à franchir.'],['hypo','Confusion, somnolence, maladresse forte ou frissons incontrôlables','Chez toi ou quelqu’un du groupe.']]};const meteo={t:'Météo et état humain',q:[['rain','Pluie continue ou qui s’intensifie','Depuis plusieurs minutes ou avec une tendance nette.'],['wind','Rafales fortes','Assez fortes pour gêner l’équilibre, le montage ou les ancrages.'],['wetCold','Trempé et froid mais encore lucide','La personne répond correctement et marche encore de façon coordonnée.'],['better','État amélioré durablement après protection','Amélioration nette après arrêt, isolation, nourriture, boisson ou couche sèche.'],['dry','Duvet, couche sèche, téléphone et batterie sont protégés','Dans un sac étanche ou réellement à l’abri.']]};const abri={t:'Protection utilisable',n:'Décris seulement ce qui existe et semble atteignable.',q:[['shelter','Bâtiment fermé ou véhicule accessible','Sans franchir un passage plus exposé.'],['shelterShared','Abri d’un autre groupe ou protection de fortune possible','Tarp, sursac, cabane ouverte, auvent, partage temporaire.'],['shelterLost','Tente perdue, inutilisable ou couchage mouillé','L’abri ou le sommeil protégé n’est plus garanti.']]};const route={t:'Terrain et engagement',q:[['terrain','Terrain simple, position certaine et progression maîtrisée','Sentier lisible, appuis corrects, groupe encore stable.'],['exposed','Crête, col, plateau ouvert ou passage à chute grave','Section où une erreur aurait de fortes conséquences.'],['committed','Déjà engagé dans un passage où revenir ou s’arrêter est difficile','Le demi-tour ou l’attente sur place exposerait aussi le groupe.'],['stablePoint','Point stable accessible sans aggraver le risque','Endroit proche pour se regrouper, se couvrir et réévaluer.']]};const margin={t:'Temps et distance',q:[['margin','Temps suffisant avant nuit ou aggravation','Marge pour ralentir, se tromper un peu ou s’arrêter.'],['shortOption','Point sûr, abri, retour ou sortie à moins d’une heure','Option réellement localisée et atteignable.'],['longOption','Option la plus proche à plus d’une heure','Aucune solution proche confirmée.']]};const ret={t:'Chemin déjà parcouru',q:[['returnKnown','Retour connu jusqu’au dernier point sûr','Trajet réellement identifié, sans raccourci supposé.'],['returnSafer','Retour moins exposé que la suite','Selon le terrain maintenant, pas seulement selon le souvenir.']]};const esc={t:'Sortie possible',q:[['escapeKnown','Sortie confirmée en temps, distance et terrain','Route, vallée, refuge ou village localisé.'],['escapeSafe','Accès sans col, torrent ou passage engagé','Pas de point dur majeur identifié sur l’accès.']]};const site={t:'Lieu de bivouac',n:'À cocher seulement après observation du lieu.',q:[['siteOk','Lieu hors ravine, berge, cuvette, crête, arbre menaçant et chute de pierres','Pas dans l’axe évident d’un danger.'],['siteDrain','Sol drainant avec une issue de repli possible','L’eau peut s’évacuer et le groupe peut bouger.']]};const camp={t:'État du camp',q:[['campThreat','Camp menacé par eau, pierres, arbre, pente ou ancrages qui cèdent','Danger actuel ou signes d’aggravation.'],['tentStable','Tente ancrée, couchage sec et matériel critique accessible','Abri en place et équipement vital disponible.']]};const packing={t:'Avant de démonter',q:[['packingReady','Sac, navigation, vêtements et destination prêts','Le groupe pourrait partir sans chercher le matériel essentiel.']]};if(c==='arrived')return [danger,meteo,abri,site,margin];if(c==='camp')return [danger,meteo,abri,camp,margin];if(c==='packing')return [danger,meteo,abri,camp,packing,margin];if(c==='return')return [danger,meteo,abri,ret,route,margin];if(c==='escape')return [danger,meteo,abri,esc,route,margin];if(c==='near')return [danger,meteo,abri,route,margin,ret,esc,site];if(c==='unknown')return [danger,meteo,abri,route,margin,ret,esc,site];return [danger,meteo,abri,route,margin,ret,esc];}
function renderOutline(){app.className='result caution';app.innerHTML=`<span class="badge">SECTION INITIÉE</span><h2>Arbre en cours de construction</h2><p>Le menu et la doctrine sont prêts. Cette section sera développée avec le même ordre : contexte stratégique, dangers immédiats, options réellement ouvertes, checklist et stabilisation.</p><div class="actions"><button class="secondary" id="menu">← Menu</button></div>`;document.getElementById('menu').addEventListener('click',renderMenu);}
function has(x){return state.answers.includes(x)}
function decide(){let r;if(state.section==='weather')r=weatherDecision();else if(state.section==='injury')r=injuryDecision();else if(state.section==='health')r=healthDecision();else if(state.section==='lost')r=lostDecision();else if(state.section==='gear')r=gearDecision();else r=rescueDecision();showResult(r);}
function weatherDecision(){
 const walking=['continue','return','escape','near','unknown'].includes(state.context);
 const siteReady=has('siteOk')&&has('siteDrain');
 const returnOpen=has('returnKnown')&&has('returnSafer');
 const escapeOpen=has('escapeKnown')&&has('escapeSafe');
 const protectedEnough=has('dry')||has('shelter')||has('shelterShared')||siteReady||has('tentStable');
 const nearHelp=has('shortOption')||has('shelter')||has('shelterShared');
 const extendedExposure=has('longOption')&&!has('shortOption');
 const canContinue=has('terrain')&&has('margin')&&has('dry')&&!has('thunder')&&!has('flood')&&!has('hypo')&&!has('wetCold')&&!has('exposed')&&!has('committed')&&!has('shelterLost');
 const weatherLoad=['rain','wind','wetCold','exposed','thunder','shelterLost'].filter(has).length;
 if(has('flood'))return R('stop','Quitte la zone basse avant toute autre action','Une montée d’eau, un torrent brun ou un ruissellement concentré rend les choix ordinaires trop fragiles : la priorité est de sortir de l’axe de l’eau, même si du matériel reste exposé.',['Éloigne-toi du torrent, de la ravine, de la berge, du lit sec ou de la cuvette.','Gagne un terrain plus haut par un passage stable, sans traverser l’eau.','Ne tente pas de récupérer une tente ou un sac si cela te remet dans l’axe de l’eau.','Regroupe les personnes et vérifie froid, blessure, téléphone et lampe.','Une fois hors d’atteinte de l’eau, compare retour, échappatoire et bivouac possible.']);
 if(has('hypo'))return R('stop','Traite le refroidissement comme l’urgence principale','Confusion, somnolence, maladresse forte ou frissons incontrôlables indiquent que la marche normale n’est plus une solution fiable.',['Arrête l’objectif et mets la personne hors du vent, de la pluie et du sol froid.','Crée ou rejoins une protection viable sans l’exposer davantage.','Remplace ou isole le mouillé, réchauffe surtout tronc, cou et tête.','Appelle les secours si confusion, somnolence, aggravation ou impossibilité de se réchauffer.','Ne repars que si la personne redevient lucide, stable et chaude.']);
 if(has('thunder')&&has('shelter'))return R('stop','Rejoins l’abri fermé maintenant','Un bâtiment fermé ou un véhicule à toit rigide est supérieur à la tente et à toute poursuite exposée.',['Quitte crête, col, plateau, eau, arbre isolé, clôture et point dominant.','Rejoins l’abri sans emprunter un passage plus dangereux.','Reste loin des ouvertures et des éléments conducteurs.','Ne reprends une activité exposée qu’après 30 minutes sans tonnerre.']);
 if(has('thunder')&&has('committed')&&has('stablePoint'))return R('caution','Rejoins le prochain point stable, pas forcément le point de départ','Le demi-tour n’est pas automatiquement meilleur si le groupe est déjà engagé. L’avis est de réduire l’exposition jusqu’au point stable le plus proche, puis de réévaluer.',['Avance ou recule seulement jusqu’au point stable le moins exposant.','Évite point haut, eau, arbre isolé, clôture et arête.','Espace le groupe si le terrain le permet.','Au point stable, compare retour, échappatoire et attente sans présumer qu’un choix est idéal.','Ne reprends un passage exposé qu’après 30 minutes sans tonnerre.']);
 if(has('thunder')&&walking)return R('stop','Sors d’abord de l’exposition foudre','Avec du tonnerre, l’objectif, le bivouac prévu et la vitesse de progression passent après la sortie des zones exposées.',['Quitte immédiatement crête, col, plateau ouvert, eau, berge, arbre isolé et clôture.','Descends vers la position la moins exposée accessible sans traversée dangereuse.','Espace le groupe si le terrain le permet et limite les objets métalliques manipulés.','Compare ensuite seulement retour, échappatoire ou bivouac de repli.','Ne reprends un passage exposé qu’après 30 minutes sans tonnerre.']);
 if(has('wetCold')&&!has('better')&&!protectedEnough)return R(nearHelp?'caution':'stop','Réduis le froid avant toute option longue','La personne est encore lucide, mais pluie, vent ou vêtements mouillés peuvent faire basculer la situation. Une marche longue sans protection fiable devient une mauvaise hypothèse.',['Coupe le vent et la pluie, même avec une solution imparfaite.','Isole du sol et remplace ou protège ce qui est mouillé.','Donne nourriture et boisson si la personne avale normalement.','Choisis seulement une option proche et confirmée si elle réduit l’exposition.','Appelle de l’aide si l’état ne s’améliore pas ou si aucune protection n’est possible.']);
 if(has('shelterLost')&&has('shelterShared'))return R('caution','Utilise l’abri disponible, même imparfait','La perte de tente ne décide pas à elle seule du demi-tour. Une protection partagée ou de fortune peut être la meilleure manière de reprendre de la marge avant de choisir la suite.',['Protège d’abord la personne froide, le téléphone, la batterie et les couches sèches.','Regroupe le matériel critique encore sec.','Demande ou organise le partage d’abri sans disperser le groupe.','Évalue ensuite retour, échappatoire ou nuit écourtée selon distance, météo et fatigue.','Prépare l’appel à l’aide si la protection ne permet pas de tenir.']);

function injuryDecision(){if(has('grave'))return R('stop','Protège, alerte et secoure','Un signe grave prime sur l’objectif et sur le choix initial de continuer ou revenir.',['Écarte seulement le danger immédiat du lieu.','Appelle les secours.','Contrôle conscience, respiration et saignement.','Protège de la pluie, du vent et du sol froid.','Ne laisse pas la personne seule.']);if(has('walk')||has('worse'))return R('stop','Ne force pas la marche','Une marche instable ou une aggravation rend incohérente la poursuite normale.',['Immobilise et protège autant que possible.','Compare une aide proche et l’appel aux secours.','N’impose pas de passage exposé.','Sur une zone de bivouac, crée une protection thermique sans aggraver la blessure.']);return R('caution',state.context==='continue'?'Teste seulement une reprise très prudente':'Garde l’option de sortie la plus simple','Une blessure apparemment mineure doit rester stable et compatible avec le terrain.',['Traite la plaie ou protège l’articulation.','Teste quelques pas sur terrain simple.','Arrête si la douleur augmente ou si la marche se dégrade.','Privilégie retour ou échappatoire avant un terrain engagé.']);}
function healthDecision(){if(has('grave')||has('vomit'))return R('stop','Arrête l’effort et demande une aide médicale','Les signes cochés peuvent dépasser une simple fatigue.',['Mets la personne sur un point sûr.','Appelle les secours si le signe grave est présent ou persiste.','Protège du froid ou de la chaleur.','Ne fais pas boire ou manger si la conscience ou la déglutition est altérée.']);if(!has('better'))return R('caution','Ne reprends pas l’objectif pour l’instant','L’absence d’amélioration après l’arrêt réduit la marge.',['Reste à l’abri du vent, de la pluie ou du soleil.','Réévalue conscience, respiration, température, douleur et hydratation.','Choisis retour, échappatoire ou bivouac sûr selon le contexte.','Appelle si l’état se dégrade.']);return R('caution','Reprends uniquement vers l’option la plus facile','L’amélioration est encourageante mais ne justifie pas un terrain engagé.',['Repars lentement sur terrain simple.','Évite col, crête et passage exposé.','Réévalue après 10 à 15 minutes.','Arrête définitivement si les symptômes reviennent.']);}
function lostDecision(){if(!has('safe'))return R('stop','Arrête-toi d’abord sur un point sûr','La navigation ne doit pas être résolue en continuant au hasard.',['Quitte seulement le danger immédiat.','Ne descends pas hors sentier.','Stabilise le groupe et protège-toi de la météo.']);if(has('return')&&has('last'))return R('caution','Reviens au dernier point certain','Le retour connu est plus cohérent qu’une progression supposée.',['Confirme le cap et le terrain du retour.','Garde le groupe ensemble.','Marque mentalement ou sur la carte chaque point confirmé.','Réévalue au dernier point certain.']);if(has('dark')||has('exposed'))return R('stop','N’ajoute pas une errance dans un terrain risqué','La nuit, la batterie faible ou le terrain engagé rendent les essais successifs dangereux.',['Reste sur un site sûr.','Prépare un abri ou une protection thermique.','Économise la batterie.','Appelle de l’aide si aucune sortie sûre ne peut être confirmée.']);return R('caution','Recoupe les informations avant de repartir','Aucune direction ne doit être choisie sur une seule indication.',['Compare carte, GPS, altitude, relief et sens des pentes.','Identifie le dernier point certain.','Choisis seulement un trajet confirmé et réversible.']);}
function gearDecision(){if(has('critical')&&!has('backup'))return R('stop','Considère l’étape comme compromise','Une fonction essentielle sans redondance peut rendre la suite ou la nuit dangereuse.',['Évalue si une réparation simple est possible sur place.','Compare retour et échappatoire avant la nuit ou le mauvais temps.','N’entre pas dans un passage engagé.','Appelle de l’aide si aucune sortie autonome sûre n’existe.']);if(has('repair'))return R('caution','Répare sur un point sûr avant de décider','La réparation doit précéder la poursuite si elle restaure une fonction importante.',['Pose le groupe hors du passage.','Protège le matériel sec pendant l’intervention.','Teste réellement la réparation.','Recalcule la marge de temps après l’arrêt.']);return R('go','Continue seulement avec une redondance vérifiée','La panne reste gérable si la fonction est réellement remplacée et si la marge est suffisante.',['Vérifie la solution de secours maintenant.','Raccourcis l’étape si la nuit ou le mauvais temps approche.','Fixe un point de réévaluation.']);}
function rescueDecision(){if(has('life')||has('walk')||has('blocked')||has('worse'))return R('stop','Appelle les secours maintenant','Les éléments cochés justifient de ne pas compter uniquement sur une évacuation improvisée.',['Écarte le danger immédiat sans déplacement inutile.','Prépare position, nombre de personnes, état, météo et terrain.','Appelle le numéro d’urgence adapté au pays.','Suis les consignes reçues.','Économise la batterie et reste joignable.','Protège le groupe pour l’attente.']);return R('caution','Prépare les informations avant de décider','Même sans signe grave coché, une préparation structurée évite de perdre du temps si la situation évolue.',['Confirme les coordonnées et le dernier point connu.','Note état, évolution, météo et autonomie.','Identifie une sortie sûre possible.','Appelle si la marche devient dangereuse ou si l’état se dégrade.']);}
function R(c,t,w,s){return{c,t,w,s}}
function showResult(r){const badge=r.c==='stop'?'ACTION PRIORITAIRE':r.c==='info'?'INFORMATION INSUFFISANTE':r.c==='caution'?'AVIS PRUDENT':'OPTION POSSIBLE';app.className=`result ${r.c}`;app.innerHTML=`<span class="badge">${badge}</span><h2>${r.t}</h2><div class="context"><b>Situation :</b> ${contexts.find(c=>c[0]===state.context)[1]}</div><div class="why">${r.w}</div><div class="checklist">${r.s.map((x,i)=>`<label class="task"><input type="checkbox" data-task><span><b>${i+1}.</b> ${x}</span></label>`).join('')}</div><div class="progress"><div class="bar" id="bar"></div></div><div class="status" id="status">0 / ${r.s.length} actions</div><div class="actions"><button class="secondary" id="back">← Modifier</button><button class="primary" id="menu">Menu principal</button></div>`;const boxes=[...app.querySelectorAll('[data-task]')];boxes.forEach(b=>b.addEventListener('change',()=>{b.closest('.task').classList.toggle('done',b.checked);const n=boxes.filter(x=>x.checked).length;document.getElementById('bar').style.width=`${n/boxes.length*100}%`;document.getElementById('status').textContent=`${n} / ${boxes.length} actions`; }));document.getElementById('back').addEventListener('click',renderQuestions);document.getElementById('menu').addEventListener('click',renderMenu);}
renderMenu();
